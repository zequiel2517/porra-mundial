// ===== MOTOR DE PUNTUACIÓN =====

function calcStatsGrupo(gi, resultadosArr) {
  const g = GRUPOS[gi], stats = {};
  g.equipos.forEach(e => { stats[e]={pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,pts:0}; });
  resultadosArr[gi].forEach((r,pi) => {
    if(r.local===null||r.visitante===null) return;
    const [loc,vis]=g.partidos[pi],el=stats[loc],ev=stats[vis],gl=r.local,gv=r.visitante;
    el.pj++;ev.pj++;el.gf+=gl;el.gc+=gv;ev.gf+=gv;ev.gc+=gl;
    if(gl>gv){el.pg++;el.pts+=3;ev.pp++;}else if(gl<gv){ev.pg++;ev.pts+=3;el.pp++;}else{el.pe++;ev.pe++;el.pts++;ev.pts++;}
  });
  return stats;
}

function ordenGrupo(gi, resultadosArr) {
  const stats = calcStatsGrupo(gi, resultadosArr);
  return [...GRUPOS[gi].equipos].sort((a,b)=>(stats[b].pts-stats[a].pts)||(stats[b].gf-stats[b].gc-(stats[a].gf-stats[a].gc))||stats[b].gf-stats[a].gf);
}

function ganadorCruce(est) {
  if(!est||est.gl===null||est.gv===null) return null;
  if(est.gl>est.gv) return 'local'; if(est.gv>est.gl) return 'visitante'; return est.elegido||null;
}

// Fase real de cada equipo: 'G','D','O','C','4','3','2','1'
function calcFasesReales(realRes, realFase) {
  const fases = {}; // equipo -> fase string ('G','D','O','C','4','3','2','1')

  // Todos empiezan en Grupos
  GRUPOS.forEach(g => g.equipos.forEach(eq => { fases[eq] = 'G'; }));

  // Grupos: los clasificados avanzan a D16
  GRUPOS.forEach((_,gi) => {
    const orden = ordenGrupo(gi, realRes);
    fases[orden[0]] = 'D'; fases[orden[1]] = 'D';
  });

  // D16 → O
  const fase_map = { d16:'D', oct:'O', qtr:'C' };
  const avance_map = { d16:'O', oct:'C', qtr:'4' };
  ['d16','oct','qtr'].forEach(fk => {
    const n = fk==='d16'?16:fk==='oct'?8:4;
    for(let i=0;i<n;i++) {
      const est = realFase[fk]?.[i];
      if(!est||est.gl===null||est.gv===null) continue;
      // necesitamos saber qué equipos son local y vis en este cruce real
      // como admin los introduce manualmente, usamos el ganador/perdedor
    }
  });

  // Semis: perdedores → 3º/4º, ganadores → final
  // Final: ganador → 1, perdedor → 2
  // Para la Regla 4 usamos la información del estadoFase real del admin
  // El admin introduce resultado + elige ganador en empate
  // Necesitamos rastrear los equipos a través de las fases reales
  // Usamos el pronóstico real de resultados_reales que incluye estadoFase
  // con los equipos ya definidos por el admin

  return fases;
}

// Fase del equipo según pronóstico
function calcFasesPronostico(pron) {
  const fases = {};
  GRUPOS.forEach(g => g.equipos.forEach(eq => { fases[eq] = 'G'; }));

  GRUPOS.forEach((_,gi) => {
    const orden = ordenGrupo(gi, pron.resultados);
    if(orden[0]) fases[orden[0]] = 'D';
    if(orden[1]) fases[orden[1]] = 'D';
  });

  const avances = { d16:'O', oct:'C', qtr:'4', semi_gan:'2', semi_per:'3_4', tercer_gan:'3', tercer_per:'4', final_gan:'1', final_per:'2' };
  const fasesElim = pron.estadoFase || {};

  // Para rastrear equipos necesitamos los cruces del pronóstico
  // Simplificación: usamos los ganadores marcados en estadoFase
  // El equipo que "pasó" en cada cruce avanza de fase
  // No tenemos los nombres de equipos en estadoFase, solo gl/gv/elegido
  // Así que usamos la posición final en el palmarés si está disponible

  return fases;
}

function calcPuntos(pron, real, reglas) {
  let r1=0, r2=0, r3=0, r4=0;
  const config = reglas;

  // REGLA 1: partidos fase de grupos
  if(config.r1?.activa) {
    GRUPOS.forEach((_,gi) => {
      GRUPOS[gi].partidos.forEach((_p,pi) => {
        const rp = pron.resultados?.[gi]?.[pi];
        const rr = real.resultados?.[gi]?.[pi];
        // Solo puntuar si hay resultado real introducido
        if(!rp||!rr||rp.local===null||rp.visitante===null) return;
        if(rr.local===null||rr.visitante===null) return;
        const signoP = Math.sign(rp.local-rp.visitante);
        const signoR = Math.sign(rr.local-rr.visitante);
        if(signoP===signoR) r1 += config.r1.ganador||1;
        if(rp.local===rr.local&&rp.visitante===rr.visitante) r1 += config.r1.exacto||3;
      });
    });
  }

  // REGLA 2: orden de grupo
  // Solo puntuar si el grupo tiene al menos un partido jugado en la realidad
  if(config.r2?.activa) {
    GRUPOS.forEach((_,gi) => {
      const resReal = real.resultados?.[gi] || [];
      const grupoJugado = resReal.some(r => r.local !== null && r.visitante !== null);
      if (!grupoJugado) return; // grupo sin resultados reales → no puntuar
      // Solo puntuar si TODOS los partidos del grupo están jugados
      const grupoCompleto = resReal.every(r => r.local !== null && r.visitante !== null);
      if (!grupoCompleto) return;
      const ordenP = ordenGrupo(gi, pron.resultados||[]);
      const ordenR = ordenGrupo(gi, real.resultados||[]);
      ordenP.forEach((eq,pos) => {
        if(ordenR[pos]===eq) r2 += config.r2.posicion||3;
      });
    });
  }

  // REGLA 3: eliminatorias — emparejamiento + resultado
  // Un emparejamiento se "acierta" si los mismos dos equipos se enfrentan
  // en la misma fase (independientemente del orden local/visitante)
  if(config.r3?.activa) {
    const fasesElim = ['d16','oct','qtr','semi','tercer','final'];
    const nPorFase = { d16:16, oct:8, qtr:4, semi:2, tercer:1, final:1 };
    fasesElim.forEach(fk => {
      const n = nPorFase[fk];
      for(let i=0;i<n;i++) {
        const ep = pron.estadoFase?.[fk]?.[i];
        const er = real.estadoFase?.[fk]?.[i];
        if(!ep||!er) continue;
        // No tenemos nombres de equipos en estadoFase, solo marcadores
        // El emparejamiento se verifica comparando si los mismos equipos
        // llegaron a ese cruce — esto requiere rastreo completo
        // Por ahora puntuamos resultado dentro del cruce si hay marcador real
        // Solo puntuar si hay resultado real introducido
        if(er.gl===null||er.gv===null) continue;
        if(ep.gl===null||ep.gv===null) continue;

        // Acertar ganador del partido (independientemente del emparejamiento)
        // Nota: el emparejamiento exacto requeriría rastrear equipos por nombre
        // lo implementamos como: si hay resultado real en ese partido, damos puntos de resultado
        const ganR = ganadorCruce(er);
        const ganP = ganadorCruce(ep);
        if(ganR&&ganP) {
          // Emparejamiento: siempre damos los puntos base (simplificación: si llegó a esa ronda)
          r3 += config.r3.emparej||5;
          // Ganador
          if(ganR===ganP) r3 += config.r3.ganador||1;
          // Marcador exacto (incluye prórroga, no penaltis → el admin introduce el marcador correcto)
          if(ep.gl===er.gl&&ep.gv===er.gv) r3 += config.r3.exacto||3;
        }
      }
    });
  }

  // REGLA 4: posiciones finales
  // Comparamos la fase a la que llegó cada equipo en pronóstico vs real
  // Necesitamos rastrear equipos → usamos ordenGrupo + estadoFase
  // Implementación completa requiere rastreo de brackets — pendiente de integración completa

  return { r1, r2, r3, r4, total: r1+r2+r3+r4 };
}

// ===== RENDER =====
let detallesAbiertos = new Set();

function inicialMayus(nombre) {
  const partes = nombre.trim().split(' ');
  return partes.map(p=>p[0]).join('').slice(0,2).toUpperCase();
}

  const podioClases = jugadores.length>=3 ? ['podio-2','podio-1','podio-3'] : jugadores.length===2 ? ['podio-2','podio-1'] : ['podio-1'];

  contenido.innerHTML = `

      </div>
    </div>
    <div class="ranking-card">
      <div class="ranking-cabecera">
        <span>Jugador</span>
        <div style="display:flex;gap:4px;font-size:9px">
          <span style="width:48px;text-align:center">R1</span>
          <span style="width:48px;text-align:center">R2</span>
          <span style="width:48px;text-align:center">R3</span>
          <span style="width:48px;text-align:center">R4</span>
          <span style="width:52px;text-align:right">Total</span>
        </div>
      </div>
      ${filasHtml}
    </div>`;
}

function toggleDetalle(uid) {
  if(detallesAbiertos.has(uid)) detallesAbiertos.delete(uid);
  else detallesAbiertos.add(uid);
  // Re-render sin recargar datos
  const panel = document.getElementById(`det-${uid}`);
  if(panel) panel.classList.toggle('abierto', detallesAbiertos.has(uid));
  const btns = document.querySelectorAll('.detalle-btn');
  btns.forEach(b => {
    if(b.getAttribute('onclick')===`toggleDetalle('${uid}')`)
      b.textContent = detallesAbiertos.has(uid) ? '▲ ocultar' : '▼ desglose';
  });
}

async function cargarRanking() {
  try {
    // Sesión actual (opcional — solo para marcar "tú" en el ranking)
    try {
      const { data: sesion } = await sb.auth.getSession();
      miUserId = sesion?.session?.user?.id || null;
    } catch(e) { miUserId = null; }

    // Resultados reales
    const { data: dr } = await sb.from('resultados_reales')
      .select('datos').eq('id','00000000-0000-0000-0000-000000000001').maybeSingle();
    const realData = dr?.datos || { resultados: GRUPOS.map(g=>g.partidos.map(()=>({local:null,visitante:null}))), estadoFase:{} };

    // Config reglas
    const { data: dc } = await sb.from('config_reglas').select('reglas').eq('id',1).maybeSingle();
    const reglas = dc?.reglas || {
      r1:{activa:true,ganador:1,exacto:3},
      r2:{activa:true,posicion:3},
      r3:{activa:true,emparej:5,ganador:1,exacto:3},
      r4:{activa:true,tabla:POS_DEFAULT},
    };

    // Todos los pronósticos
    const { data: pronos } = await sb.from('pronosticos').select('user_id, nombre, datos');

    if(!pronos||!pronos.length) {
      document.getElementById('contenido').innerHTML = '<div class="loading-txt">Aún no hay pronósticos guardados.</div>';
      return;
    }

    // Calcular puntos para cada jugador
    const jugadores = pronos.map(p => ({
      user_id: p.user_id,
      nombre: p.nombre || 'Jugador',
      puntos: calcPuntos(
        typeof p.datos === 'string' ? JSON.parse(p.datos) : (p.datos||{}),
        realData,
        reglas
      )
    }));

    // Ordenar por total desc
    jugadores.sort((a,b) => b.puntos.total - a.puntos.total);

    renderRanking(jugadores);

    const ahora = new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('ultima-act').textContent = `Actualizado ${ahora}`;

  } catch(e) {
    console.error(e);
    document.getElementById('contenido').innerHTML = `<div class="error-txt">❌ Error cargando datos: ${e.message}</div>`;
  }
}

// Cargar al inicio y cada 5 minutos
cargarRanking();
setInterval(cargarRanking, 5 * 60 * 1000);
</script>
