function calcStatsGrupo(gi, resultadosArr) {
  const g = GRUPOS[gi], stats = {};
  g.equipos.forEach(e => { stats[e]={pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,pts:0}; });
  (resultadosArr[gi]||[]).forEach((r,pi) => {
    if(r.local===null||r.visitante===null) return;
    const [loc,vis]=g.partidos[pi],el=stats[loc],ev=stats[vis],gl=r.local,gv=r.visitante;
    el.pj++;ev.pj++;el.gf+=gl;el.gc+=gv;ev.gf+=gv;ev.gc+=gl;
    if(gl>gv){el.pg++;el.pts+=3;ev.pp++;}else if(gl<gv){ev.pg++;ev.pts+=3;el.pp++;}else{el.pe++;ev.pe++;el.pts++;ev.pts++;}
  });
  return stats;
}

function ordenGrupo(gi, resultadosArr) {
  const stats = calcStatsGrupo(gi, resultadosArr);
  return [...GRUPOS[gi].equipos].sort((a,b)=>(stats[b].pts-stats[a].pts)||(stats[b].gf-stats[b].gc-(stats[a].gf-stats[a].gc))||stats[b].gf-stats[a].gf);
}

}

function asignarTerceros(top8){
  const letras=top8.map(t=>letraGrupo(t.gi));
  const key=[...letras].sort().join(',');
  const fila=FIFA_TABLA[key];
  if(!fila){ console.warn('Combinación no en tabla FIFA:',key); return asignarTercerosFallback(top8); }
  const giMap={};
  top8.forEach(t=>{ giMap[letraGrupo(t.gi)]=t; });
  const asig={};
  PARTIDOS_VAR.forEach(pv=>{ const letra=fila[pv.pnum]; asig[pv.pnum]=letra?(giMap[letra]||null):null; });
  return asig;
}
function asignarTercerosFallback(top8){
  const pvs=PARTIDOS_VAR,giMap={};
  top8.forEach(t=>{giMap[t.gi]=t;});
  const gis=top8.map(t=>t.gi),pAgi={},giAp={};
  function aug(pnum,vis){const pv=pvs.find(p=>p.pnum===pnum);for(const gi of gis){if(vis.has(gi)||!pv.ok.includes(gi))continue;vis.add(gi);if(!(gi in giAp)||aug(giAp[gi],vis)){pAgi[pnum]=gi;giAp[gi]=pnum;return true;}}return false;}
  pvs.forEach(pv=>aug(pv.pnum,new Set()));
  const asig={};pvs.forEach(pv=>{asig[pv.pnum]=(pv.pnum in pAgi)?giMap[pAgi[pv.pnum]]:null;});return asig;
}
function ganadorCruce(est){if(!est||est.gl===null||est.gv===null)return null;if(est.gl>est.gv)return 'local';if(est.gv>est.gl)return 'visitante';return est.elegido||null;}
function perdedorCruce(est){const g=ganadorCruce(est);if(!g)return null;return g==='local'?'visitante':'local';}

function buildCrucesD16(resArr, tercerosOvr){
  const p=[],s=[],top8=get8Terceros(resArr).slice(0,8);
  GRUPOS.forEach((_,gi)=>{const cl=getClasificadosR(gi,resArr);p.push({eq:cl.p1,gi});s.push({eq:cl.p2,gi});});
  const asig=asignarTerceros(top8);
  const f2=[{pnum:'P73',local:s[0],vis:s[1]},{pnum:'P78',local:s[4],vis:s[8]},{pnum:'P83',local:s[10],vis:s[11]},{pnum:'P88',local:s[3],vis:s[6]}];
  const f12=[{pnum:'P75',local:p[5],vis:s[2]},{pnum:'P76',local:p[2],vis:s[5]},{pnum:'P84',local:p[7],vis:s[9]},{pnum:'P86',local:p[9],vis:s[7]}];
  const vars=PARTIDOS_VAR.map(pv=>({pnum:pv.pnum,local:p[pv.pgr],vis:asig[pv.pnum]||null}));
  return [...f2,...f12,...vars].sort((a,b)=>+a.pnum.slice(1)-+b.pnum.slice(1));
}


// Versión de getClasificados que acepta resultados como parámetro
function getClasificadosR(gi, resArr) {
  const g=GRUPOS[gi], stats={};
  g.equipos.forEach(e=>{stats[e]={pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,pts:0};});
  (resArr[gi]||[]).forEach((r,pi)=>{
    if(r.local===null||r.visitante===null)return;
    const [loc,vis]=g.partidos[pi],el=stats[loc],ev=stats[vis],gl=r.local,gv=r.visitante;
    el.pj++;ev.pj++;el.gf+=gl;el.gc+=gv;ev.gf+=gv;ev.gc+=gl;
    if(gl>gv){el.pg++;el.pts+=3;ev.pp++;}else if(gl<gv){ev.pg++;ev.pts+=3;el.pp++;}else{el.pe++;ev.pe++;el.pts++;ev.pts++;}
  });
  const ord=[...g.equipos].sort((a,b)=>(stats[b].pts-stats[a].pts)||(stats[b].gf-stats[b].gc-(stats[a].gf-stats[a].gc))||stats[b].gf-stats[a].gf);
  return {p1:ord[0],p2:ord[1],p3:ord[2],p4:ord[3],stats};
}

// Reconstruir bracket completo desde resultados+estadoFase
// Si estadoFase tiene local/vis guardados, los usa directamente (más preciso)
// Si no, los reconstruye desde el bracket
function buildBracket(resArr, faseData, tercerosOvr) {
  const bracket = {};

  // D16: usar local/vis del estadoFase si están disponibles
  const crucesD16 = buildCrucesD16(resArr, tercerosOvr);
  bracket.d16 = crucesD16.map((cr,i) => {
    const est = faseData.d16?.[i]||{gl:null,gv:null,elegido:null};
    return {
      local: est.local || cr.local?.eq||'?',
      vis:   est.vis   || cr.vis?.eq||'?',
      est
    };
  });

  const ganEq = (fase, i) => {
    const cr = bracket[fase]?.[i]; if(!cr) return '?';
    const g = ganadorCruce(cr.est); if(!g) return '?';
    return g==='local' ? cr.local : cr.vis;
  };
  const perEq = (fase, i) => {
    const cr = bracket[fase]?.[i]; if(!cr) return '?';
    const g = ganadorCruce(cr.est); if(!g) return '?';
    return g==='local' ? cr.vis : cr.local;
  };

  // Para cada fase posterior: usar local/vis guardados si existen, sino reconstruir
  const buildFase = (faseKey, n, localFn, visFn) => {
    return Array.from({length:n},(_,i)=>{
      const est = faseData[faseKey]?.[i]||{gl:null,gv:null,elegido:null};
      return {
        local: est.local || localFn(i),
        vis:   est.vis   || visFn(i),
        est
      };
    });
  };

  bracket.oct    = buildFase('oct',   8, i=>ganEq('d16',i*2),  i=>ganEq('d16',i*2+1));
  bracket.qtr    = buildFase('qtr',   4, i=>ganEq('oct',i*2),  i=>ganEq('oct',i*2+1));
  bracket.semi   = buildFase('semi',  2, i=>ganEq('qtr',i*2),  i=>ganEq('qtr',i*2+1));
  bracket.tercer = buildFase('tercer',1, ()=>perEq('semi',0),   ()=>perEq('semi',1));
  bracket.final  = buildFase('final', 1, ()=>ganEq('semi',0),   ()=>ganEq('semi',1));

  return bracket;
}

function calcPuntos(pron, real, reglas, crucesReal, posReal) {
  let r1=0, r2=0, r3=0, r4=0;
  const config = reglas;
  crucesReal = crucesReal || [];
  posReal = posReal || {};

  // REGLA 1: partidos fase de grupos
  if(config.r1?.activa) {
    GRUPOS.forEach((_,gi) => {
      GRUPOS[gi].partidos.forEach((_p,pi) => {
        const rp = pron.resultados?.[gi]?.[pi];
        const rr = real.resultados?.[gi]?.[pi];
        if(!rp||!rr||rp.local===null||rp.visitante===null) return;
        if(rr.local===null||rr.visitante===null) return;
        const signoP = Math.sign(rp.local-rp.visitante);
        const signoR = Math.sign(rr.local-rr.visitante);
        if(signoP===signoR) r1 += config.r1.ganador||1;
        if(rp.local===rr.local&&rp.visitante===rr.visitante) r1 += config.r1.exacto||3;
      });
    });
  }

  // REGLA 2: orden de grupo
  if(config.r2?.activa) {
    GRUPOS.forEach((_,gi) => {
      const resReal = real.resultados?.[gi] || [];
      const grupoCompleto = resReal.every(r => r.local !== null && r.visitante !== null);
      if (!grupoCompleto) return;
      const ordenP = ordenGrupo(gi, pron.resultados||[]);
      const ordenR = ordenGrupo(gi, real.resultados||[]);
      ordenP.forEach((eq,pos) => {
        if(ordenR[pos]===eq) r2 += config.r2.posicion||3;
      });
    });
  }

  // REGLA 3: eliminatorias — usando tabla cruces de BD
  if(config.r3?.activa && crucesReal.length > 0) {
    // Agrupar cruces reales por fase
    const crucesPorFase = {};
    crucesReal.forEach(cr => {
      if(!crucesPorFase[cr.fase]) crucesPorFase[cr.fase] = [];
      crucesPorFase[cr.fase].push(cr);
    });

    // Para cada cruce real con resultado, buscar el emparejamiento en el pronóstico
    crucesReal.forEach(cr => {
      if(cr.gl===null||cr.gv===null) return; // sin resultado real
      const ef = pron.estadoFase || {};
      const crucesP = Object.values(ef[cr.fase]||{});

      // Buscar en el pronóstico del jugador si hay un cruce con los mismos equipos en esta fase
      const ep = crucesP.find(p => {
        if(!p||p.gl===null||p.gv===null) return false;
        const lP=p.local, vP=p.vis, lR=cr.local, vR=cr.vis;
        return lP&&vP&&lR&&vR&&((lP===lR&&vP===vR)||(lP===vR&&vP===lR));
      });

      if(ep) {
        // ✅ Emparejamiento acertado
        r3 += config.r3.emparej||5;
        // Ganador
        const ganR = cr.gl>cr.gv?cr.local:cr.gv>cr.gl?cr.vis:cr.elegido==='local'?cr.local:cr.vis;
        const ganP = ep.gl>ep.gv?ep.local:ep.gv>ep.gl?ep.vis:ep.elegido==='local'?ep.local:ep.vis;
        if(ganR&&ganP&&ganR===ganP) r3 += config.r3.ganador||1;
        // Marcador exacto
        if(ep.gl===cr.gl&&ep.gv===cr.gv) r3 += config.r3.exacto||3;
      }
    });
  }

  // REGLA 4: posiciones finales — usando tabla posiciones_finales de BD
  if(config.r4?.activa && config.r4?.tabla && Object.keys(posReal).length > 0) {
    try {
      const POS_IDX = {'1':0,'2':1,'3':2,'4':3,'SEMI':4,'QTR':4,'OCT':5,'D16':6,'G':7};
      const tabla = config.r4.tabla;

      // Calcular posiciones del pronóstico del jugador
      const posP = {};
      GRUPOS.forEach(g => g.equipos.forEach(eq => { posP[eq] = 'G'; }));
      const ef = pron.estadoFase || {};
      const res = pron.resultados || [];

      // Clasificados de grupos → D16
      GRUPOS.forEach((g,gi) => {
        const stats={};
        g.equipos.forEach(e=>{stats[e]={pts:0,gf:0,gc:0};});
        (res[gi]||[]).forEach((r,pi)=>{
          if(r.local===null||r.visitante===null)return;
          const [loc,vis]=g.partidos[pi];
          stats[loc].gf+=r.local;stats[loc].gc+=r.visitante;stats[vis].gf+=r.visitante;stats[vis].gc+=r.local;
          if(r.local>r.visitante)stats[loc].pts+=3;else if(r.local<r.visitante)stats[vis].pts+=3;else{stats[loc].pts++;stats[vis].pts++;}
        });
        const ord=[...g.equipos].sort((a,b)=>(stats[b].pts-stats[a].pts)||(stats[b].gf-stats[b].gc-(stats[a].gf-stats[a].gc))||stats[b].gf-stats[a].gf);
        if(ord[0])posP[ord[0]]='D16';if(ord[1])posP[ord[1]]='D16';
      });

      // Avances por fase
      const gan=(fase,i)=>{ const e=ef[fase]?.[i]||ef[fase]?.[String(i)]; if(!e||e.gl===null||e.gv===null)return null; const lEq=e.local||'?',vEq=e.vis||'?'; if(e.gl>e.gv)return lEq;if(e.gv>e.gl)return vEq;return e.elegido==='local'?lEq:e.elegido==='visitante'?vEq:null; };
      const per=(fase,i)=>{ const e=ef[fase]?.[i]||ef[fase]?.[String(i)]; if(!e||e.gl===null||e.gv===null)return null; const lEq=e.local||'?',vEq=e.vis||'?'; if(e.gl>e.gv)return vEq;if(e.gv>e.gl)return lEq;return e.elegido==='local'?vEq:e.elegido==='visitante'?lEq:null; };
      for(let i=0;i<16;i++){const g=gan('d16',i);if(g&&g!=='?')posP[g]='OCT';}
      for(let i=0;i<8;i++){const g=gan('oct',i),p=per('oct',i);if(g&&g!=='?')posP[g]='QTR';if(p&&p!=='?')posP[p]='OCT';}
      for(let i=0;i<4;i++){const g=gan('qtr',i),p=per('qtr',i);if(g&&g!=='?')posP[g]='SEMI';if(p&&p!=='?')posP[p]='QTR';}
      for(let i=0;i<2;i++){const g=gan('semi',i),p=per('semi',i);if(g&&g!=='?')posP[g]='FINAL';if(p&&p!=='?')posP[p]='4';}
      const g3=gan('tercer',0),p3=per('tercer',0);if(g3&&g3!=='?')posP[g3]='3';if(p3&&p3!=='?')posP[p3]='4';
      const gF=gan('final',0),pF=per('final',0);if(gF&&gF!=='?')posP[gF]='1';if(pF&&pF!=='?')posP[pF]='2';

      // Mapear posiciones a índices de tabla
      const idxR4 = {'1':0,'2':1,'3':2,'4':3,'FINAL':3,'SEMI':4,'QTR':4,'OCT':5,'D16':6,'G':7};

      // Debug: mostrar posiciones de equipos clave
      console.log('posReal España:', posReal['España'], 'posP España:', posP['España']);
      console.log('posReal Inglaterra:', posReal['Inglaterra'], 'posP Inglaterra:', posP['Inglaterra']);
      console.log('posReal Brasil:', posReal['Brasil'], 'posP Brasil:', posP['Brasil']);
      console.log('posReal Francia:', posReal['Francia'], 'posP Francia:', posP['Francia']);
      // Comparar posición real (de BD) vs pronóstico
      GRUPOS.forEach(g => g.equipos.forEach(eq => {
        const pr = posReal[eq], pp = posP[eq];
        if(!pr||!pp) return;
        const ri = idxR4[pr] ?? 7;
        const pi = idxR4[pp] ?? 7;
        if(tabla[pi]?.[ri] !== undefined) r4 += tabla[pi][ri];
      }));
    } catch(e) { console.warn('R4 error:', e); }
  }

  return { r1, r2, r3, r4, total: r1+r2+r3+r4 };
}

// ===== RENDER =====
let detallesAbiertos = new Set();

function inicialMayus(nombre) {
  const partes = nombre.trim().split(' ');
  return partes.map(p=>p[0]).join('').slice(0,2).toUpperCase();
}

function renderRanking(jugadores) {
  const contenido = document.getElementById('contenido');
  if(!jugadores.length) {
    contenido.innerHTML = '<div class="loading-txt">Aún no hay pronósticos guardados.</div>';
    return;
  }

  const top3 = jugadores.slice(0,3);
  const podioOrder = jugadores.length>=3 ? [top3[1], top3[0], top3[2]] : top3.length===2 ? [top3[1], top3[0]] : [top3[0]];
  const podioClases = jugadores.length>=3 ? ['podio-2','podio-1','podio-3'] : jugadores.length===2 ? ['podio-2','podio-1'] : ['podio-1'];
  const podioEmojis = ['🥈','🥇','🥉'];

  const podioHtml = `<div class="podio">
    ${podioOrder.map((j,i)=>`
      <div class="podio-item ${podioClases[i]}">
        <div class="podio-avatar">${inicialMayus(j.nombre)}</div>
        <div class="podio-nombre">${j.nombre}</div>
        <div class="podio-pts">${j.puntos.total} pts</div>
        <div class="podio-base">${podioEmojis[i]||''}</div>
      </div>`).join('')}
  </div>`;

  const filasHtml = jugadores.map((j,i)=>{
    const posClase = i===0?'oro':i===1?'plata':i===2?'bronce':'';
    const esYo = j.user_id===miUserId;
    const abierto = detallesAbiertos.has(j.user_id);
    return `
      <div class="ranking-fila${esYo?' yo':''}${i===0?' primero':''}">
        <div class="r-pos ${posClase}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
        <div>
          <div class="r-nombre">${j.nombre} ${esYo?'<span class="r-yo">tú</span>':''}</div>
          <span class="detalle-btn" onclick="toggleDetalle('${j.user_id}')">
            ${abierto?'▲ ocultar':'▼ desglose'}
          </span>
        </div>
        <div class="r-sub">${j.puntos.r1}</div>
        <div class="r-sub">${j.puntos.r2}</div>
        <div class="r-sub">${j.puntos.r3}</div>
        <div class="r-sub">${j.puntos.r4}</div>
        <div class="r-pts">${j.puntos.total}</div>
      </div>
      <div class="detalle-panel${abierto?' abierto':''}" id="det-${j.user_id}">
        <div class="detalle-fila"><span>R1 — Fase de grupos</span><span>${j.puntos.r1} pts</span></div>
        <div class="detalle-fila"><span>R2 — Orden de grupo</span><span>${j.puntos.r2} pts</span></div>
        <div class="detalle-fila"><span>R3 — Eliminatorias</span><span>${j.puntos.r3} pts</span></div>
        <div class="detalle-fila"><span>R4 — Posiciones finales</span><span>${j.puntos.r4} pts</span></div>
        <div class="detalle-fila" style="border-top:0.5px solid #e2e8f0;margin-top:4px;padding-top:4px;font-weight:600">
          <span>Total</span><span>${j.puntos.total} pts</span>
        </div>
      </div>`;
  }).join('');

  contenido.innerHTML = `
    ${podioHtml}
    <div class="leyenda">
      <div class="leyenda-titulo">Columnas</div>
      <div class="leyenda-items">
        <span class="leyenda-item">R1 Grupos</span>
        <span class="leyenda-item">R2 Orden</span>
        <span class="leyenda-item">R3 Elim.</span>
        <span class="leyenda-item">R4 Pos. Final</span>
      </div>
    </div>
    <div class="ranking-card">
      <div class="ranking-cabecera">
        <span>Jugador</span>
        <div style="display:flex;gap:4px;font-size:9px">
          <span style="width:48px;text-align:center">R1</span>
          <span style="width:48px;text-align:center">R2</span>
          <span style="width:48px;text-align:center">R3</span>
          <span style="width:48px;text-align:center">R4</span>
          <span style="width:52px;text-align:right">Total</span>
        </div>
      </div>
      ${filasHtml}
    </div>`;
}

function toggleDetalle(uid) {
  if(detallesAbiertos.has(uid)) detallesAbiertos.delete(uid);
  else detallesAbiertos.add(uid);
  // Re-render sin recargar datos
  const panel = document.getElementById(`det-${uid}`);
  if(panel) panel.classList.toggle('abierto', detallesAbiertos.has(uid));
  const btns = document.querySelectorAll('.detalle-btn');
  btns.forEach(b => {
    if(b.getAttribute('onclick')===`toggleDetalle('${uid}')`)
      b.textContent = detallesAbiertos.has(uid) ? '▲ ocultar' : '▼ desglose';
  });
}

async function cargarRanking() {
  try {
    // Sesión actual (opcional — solo para marcar "tú" en el ranking)
    try {
      const { data: sesion } = await sb.auth.getSession();
      miUserId = sesion?.session?.user?.id || null;
    } catch(e) { miUserId = null; }

    // Resultados reales
    const { data: dr } = await sb.from('resultados_reales')
      .select('datos').eq('id','00000000-0000-0000-0000-000000000001').maybeSingle();
    const realDataRaw = dr?.datos || null;
    const realData = realDataRaw
      ? (typeof realDataRaw === 'string' ? JSON.parse(realDataRaw) : realDataRaw)
      : { resultados: GRUPOS.map(g=>g.partidos.map(()=>({local:null,visitante:null}))), estadoFase:{} };

    // Config reglas
    const { data: dc } = await sb.from('config_reglas').select('reglas').eq('id',1).maybeSingle();
    const reglas = dc?.reglas || {
      r1:{activa:true,ganador:1,exacto:3},
      r2:{activa:true,posicion:3},
      r3:{activa:true,emparej:5,ganador:1,exacto:3},
      r4:{activa:true,tabla:POS_DEFAULT},
    };

    // Todos los pronósticos
    const { data: pronos } = await sb.from('pronosticos').select('user_id, nombre, datos');

    if(!pronos||!pronos.length) {
      document.getElementById('contenido').innerHTML = '<div class="loading-txt">Aún no hay pronósticos guardados.</div>';
      return;
    }

    // Cargar cruces y posiciones_finales de BD
    const [{ data: crucesData }, { data: posData }] = await Promise.all([
      sb.from('cruces').select('*'),
      sb.from('posiciones_finales').select('equipo,posicion'),
    ]);
    const crucesReal = crucesData || [];
    const posReal = {};
    (posData||[]).forEach(p => { posReal[p.equipo] = p.posicion; });

    // Calcular puntos para cada jugador
    const jugadores = pronos.map(p => ({
      user_id: p.user_id,
      nombre: p.nombre || 'Jugador',
      puntos: calcPuntos(
        typeof p.datos === 'string' ? JSON.parse(p.datos) : (p.datos||{}),
        realData,
        reglas,
        crucesReal,
        posReal
      )
    }));

    // Ordenar por total desc
    jugadores.sort((a,b) => b.puntos.total - a.puntos.total);

    renderRanking(jugadores);

    const ahora = new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('ultima-act').textContent = `Actualizado ${ahora}`;

  } catch(e) {
    console.error(e);
    document.getElementById('contenido').innerHTML = `<div class="error-txt">❌ Error cargando datos: ${e.message}</div>`;
  }
}

// Cargar al inicio y cada 5 minutos
cargarRanking();
setInterval(cargarRanking, 5 * 60 * 1000);
</script>
