<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Porra Mundial 2026 — Acceder</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: #1e293b;
      border-radius: 16px;
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo .trofeo { font-size: 48px; display: block; margin-bottom: 0.5rem; }
    .logo h1 { font-size: 20px; font-weight: 700; color: #f1f5f9; letter-spacing: -0.02em; }
    .logo p { font-size: 13px; color: #94a3b8; margin-top: 4px; }

    .tabs {
      display: flex;
      background: #0f172a;
      border-radius: 10px;
      padding: 3px;
      margin-bottom: 1.5rem;
    }
    .tab {
      flex: 1; text-align: center; padding: 8px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      border-radius: 8px; color: #64748b; transition: all 0.2s;
      border: none; background: none;
    }
    .tab.activo { background: #1e293b; color: #f1f5f9; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }

    .form-group { margin-bottom: 1rem; }
    label { display: block; font-size: 12px; font-weight: 500; color: #94a3b8; margin-bottom: 6px; }
    input {
      width: 100%; padding: 11px 14px; font-size: 14px;
      background: #0f172a; border: 1px solid #334155;
      border-radius: 10px; color: #f1f5f9; outline: none;
      transition: border-color 0.2s;
    }
    input::placeholder { color: #475569; }
    input:focus { border-color: #3b82f6; }

    .btn-primary {
      width: 100%; padding: 12px; font-size: 14px; font-weight: 600;
      background: #2563eb; color: #fff; border: none;
      border-radius: 10px; cursor: pointer; margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #334155; color: #64748b; cursor: default; }

    .mensaje {
      margin-top: 1rem; padding: 10px 14px; border-radius: 8px;
      font-size: 13px; text-align: center; display: none;
    }
    .mensaje.error { background: #450a0a; color: #fca5a5; border: 1px solid #7f1d1d; display: block; }
    .mensaje.ok    { background: #052e16; color: #86efac; border: 1px solid #14532d; display: block; }

    .divider { text-align: center; color: #475569; font-size: 12px; margin: 1.25rem 0; position: relative; }
    .divider::before, .divider::after { content:''; position:absolute; top:50%; width:42%; height:1px; background:#334155; }
    .divider::before { left:0; } .divider::after { right:0; }

    .nota { font-size: 11px; color: #64748b; text-align: center; margin-top: 1.25rem; line-height: 1.5; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <span class="trofeo">🏆</span>
    <h1>Porra Mundial 2026</h1>
    <p>Haz tu pronóstico y compite con tus amigos</p>
  </div>

  <div class="tabs">
    <button class="tab activo" id="tab-login" onclick="cambiarTab('login')">Entrar</button>
    <button class="tab" id="tab-registro" onclick="cambiarTab('registro')">Registrarse</button>
  </div>

  <!-- LOGIN -->
  <div id="form-login">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" onclick="doLogin()">Entrar</button>
  </div>

  <!-- REGISTRO -->
  <div id="form-registro" style="display:none">
    <div class="form-group">
      <label>Tu nombre (se verá en el ranking)</label>
      <input type="text" id="reg-nombre" placeholder="Ej: Paco el crack" maxlength="30">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="reg-pass" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
    </div>
    <button class="btn-primary" onclick="doRegistro()">Crear cuenta</button>
  </div>

  <div class="mensaje" id="msg"></div>
  <div class="nota">Al registrarte podrás guardar tu pronóstico<br>y ver el ranking de todos los participantes.</div>
</div>

<script>
  const SUPABASE_URL = 'https://nbntbdfedjbmvwmrudeo.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ibnRiZGZlZGpibXZ3bXJ1ZGVvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MTIzNzQsImV4cCI6MjA5NjA4ODM3NH0.46Nr-mqvZSSNFd47VCgdWBD-DmD0tK5nXQ8YFEve2CI';

  // ---- Utilidades de mensajes (no dependen de Supabase) ----
  function mostrarMsg(texto, tipo) {
    const el = document.getElementById('msg');
    el.textContent = texto;
    el.className = `mensaje ${tipo}`;
  }
  function ocultarMsg() {
    document.getElementById('msg').className = 'mensaje';
  }

  // ---- Cambio de pestañas: SIEMPRE funciona, aunque falle Supabase ----
  function cambiarTab(tab) {
    document.getElementById('form-login').style.display    = tab === 'login'    ? '' : 'none';
    document.getElementById('form-registro').style.display = tab === 'registro' ? '' : 'none';
    document.getElementById('tab-login').classList.toggle('activo',    tab === 'login');
    document.getElementById('tab-registro').classList.toggle('activo', tab === 'registro');
    ocultarMsg();
  }

  // Enlazamos los clicks por JS (no dependemos solo del onclick inline)
  document.getElementById('tab-login').addEventListener('click', () => cambiarTab('login'));
  document.getElementById('tab-registro').addEventListener('click', () => cambiarTab('registro'));

  // ---- Inicialización de Supabase, controlada ----
  // OJO: no se puede llamar a esta variable "supabase" porque choca con el
  // global window.supabase de la librería del CDN (SyntaxError). Usamos "sb".
  let sb = null;
  if (window.supabase && typeof window.supabase.createClient === 'function') {
    try {
      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    } catch (e) {
      console.error('Error creando el cliente de Supabase:', e);
    }
  }

  if (!sb) {
    // La librería no cargó: avisamos en pantalla en vez de fallar en silencio.
    mostrarMsg('No se pudo conectar con el servidor. Revisa tu conexión a Internet y recarga la página.', 'error');
  } else {
    // Validamos la sesión CONTRA EL SERVIDOR (getUser), no la copia local.
    // Si el usuario fue borrado o la sesión es inválida, la limpiamos y nos
    // quedamos en el login. Así evitamos el bucle login <-> pronósticos.
    sb.auth.getUser()
      .then(({ data, error }) => {
        if (!error && data && data.user) {
          window.location.href = 'pronosticos.html';
        } else {
          sb.auth.signOut();   // limpia cualquier sesión muerta guardada
        }
      })
      .catch(err => console.error('No se pudo comprobar la sesión:', err));
  }

  async function doLogin() {
    if (!sb) { mostrarMsg('Sin conexión con el servidor. Recarga la página.', 'error'); return; }
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    if (!email || !pass) { mostrarMsg('Rellena email y contraseña.', 'error'); return; }

    const btn = document.querySelector('#form-login .btn-primary');
    btn.disabled = true; btn.textContent = 'Entrando...';

    try {
      const { error } = await sb.auth.signInWithPassword({ email, password: pass });
      if (error) {
        mostrarMsg('Email o contraseña incorrectos.', 'error');
        btn.disabled = false; btn.textContent = 'Entrar';
      } else {
        window.location.href = 'pronosticos.html';
      }
    } catch (e) {
      mostrarMsg('Error de conexión: ' + e.message, 'error');
      btn.disabled = false; btn.textContent = 'Entrar';
    }
  }

  async function doRegistro() {
    if (!sb) { mostrarMsg('Sin conexión con el servidor. Recarga la página.', 'error'); return; }
    const nombre = document.getElementById('reg-nombre').value.trim();
    const email  = document.getElementById('reg-email').value.trim();
    const pass   = document.getElementById('reg-pass').value;

    if (!nombre) { mostrarMsg('Pon tu nombre para el ranking.', 'error'); return; }
    if (!email)  { mostrarMsg('El email es obligatorio.', 'error'); return; }
    if (pass.length < 6) { mostrarMsg('La contraseña debe tener al menos 6 caracteres.', 'error'); return; }

    const btn = document.querySelector('#form-registro .btn-primary');
    btn.disabled = true; btn.textContent = 'Creando cuenta...';

    try {
      const { error } = await sb.auth.signUp({
        email, password: pass,
        options: { data: { nombre } }
      });

      if (error) {
        mostrarMsg('Error: ' + error.message, 'error');
      } else {
        mostrarMsg('¡Cuenta creada! Revisa tu email para confirmarla y luego entra.', 'ok');
      }
    } catch (e) {
      mostrarMsg('Error de conexión: ' + e.message, 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Crear cuenta';
    }
  }

  // Enter para enviar según la pestaña visible
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const enRegistro = document.getElementById('form-registro').style.display !== 'none';
    if (enRegistro) doRegistro(); else doLogin();
  });
</script>
</body>
</html>
