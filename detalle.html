// Banderas
const FLAGS = {"México":"🇲🇽","Sudáfrica":"🇿🇦","Corea del Sur":"🇰🇷","Rep. Checa":"🇨🇿","Canadá":"🇨🇦","Bosnia y Herz.":"🇧🇦","Catar":"🇶🇦","Suiza":"🇨🇭","Brasil":"🇧🇷","Marruecos":"🇲🇦","Haití":"🇭🇹","Escocia":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Estados Unidos":"🇺🇸","Paraguay":"🇵🇾","Australia":"🇦🇺","Turquía":"🇹🇷","Alemania":"🇩🇪","Curazao":"🇨🇼","Costa de Marfil":"🇨🇮","Ecuador":"🇪🇨","Países Bajos":"🇳🇱","Japón":"🇯🇵","Suecia":"🇸🇪","Túnez":"🇹🇳","Bélgica":"🇧🇪","Egipto":"🇪🇬","Irán":"🇮🇷","Nueva Zelanda":"🇳🇿","España":"🇪🇸","Cabo Verde":"🇨🇻","Arabia Saudita":"🇸🇦","Uruguay":"🇺🇾","Francia":"🇫🇷","Senegal":"🇸🇳","Irak":"🇮🇶","Noruega":"🇳🇴","Argentina":"🇦🇷","Argelia":"🇩🇿","Austria":"🇦🇹","Jordania":"🇯🇴","Portugal":"🇵🇹","R.D. Congo":"🇨🇩","Uzbekistán":"🇺🇿","Colombia":"🇨🇴","Inglaterra":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Croacia":"🇭🇷","Ghana":"🇬🇭","Panamá":"🇵🇦"};
const F = eq => FLAGS[eq]||'🏳';

function calcStatsGrupo(gi, resultadosArr) {
  const g = GRUPOS[gi], stats = {};
  g.equipos.forEach(e => { stats[e]={pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,pts:0}; });
  (resultadosArr[gi]||[]).forEach((r,pi) => {
    if(r.local===null||r.visitante===null) return;
    const [loc,vis]=g.partidos[pi],el=stats[loc],ev=stats[vis],gl=r.local,gv=r.visitante;
    el.pj++;ev.pj++;el.gf+=gl;el.gc+=gv;ev.gf+=gv;ev.gc+=gl;
    if(gl>gv){el.pg++;el.pts+=3;ev.pp++;}else if(gl<gv){ev.pg++;ev.pts+=3;el.pp++;}else{el.pe++;ev.pe++;el.pts++;ev.pts++;}
  });
  return stats;
}

function ordenGrupo(gi, resultadosArr) {
  const stats = calcStatsGrupo(gi, resultadosArr);
  return [...GRUPOS[gi].equipos].sort((a,b)=>(stats[b].pts-stats[a].pts)||(stats[b].gf-stats[b].gc-(stats[a].gf-stats[a].gc))||stats[b].gf-stats[a].gf);
}

function ganadorCruce(est) {
  if(!est||est.gl===null||est.gv===null) return null;
  if(est.gl>est.gv) return 'local';
  if(est.gv>est.gl) return 'visitante';
  return est.elegido||null;
}

// Calcular puntos R1 para un partido
function ptsR1(rp, rr, cfg) {
  if(!rr||rr.local===null||rr.visitante===null) return null; // sin resultado real
  if(!rp||rp.local===null||rp.visitante===null) return 0;
  let pts = 0;
  const signoP = Math.sign(rp.local - rp.visitante);
  const signoR = Math.sign(rr.local - rr.visitante);
  if(signoP === signoR) pts += cfg.ganador||1;
  if(rp.local === rr.local && rp.visitante === rr.visitante) pts += cfg.exacto||3;
  return pts;
}

// Calcular puntos R3 para un jugador usando cruces de BD
function calcR3Jugador(datos, crucesReal, cfg) {
  let pts = 0;
  const ef = datos?.estadoFase || {};
  crucesReal.forEach(cr => {
    if(cr.gl===null||cr.gv===null) return;
    // Buscar en el pronóstico si hay un cruce con los mismos equipos en esta fase
    const crucesP = Object.values(ef[cr.fase]||{});
    const ep = crucesP.find(p => {
      if(!p||p.gl===null||p.gv===null) return false;
      const lP=p.local, vP=p.vis, lR=cr.local, vR=cr.vis;
      return lP&&vP&&lR&&vR&&((lP===lR&&vP===vR)||(lP===vR&&vP===lR));
    });
    if(ep) {
      pts += cfg.emparej||5;
      const ganR = cr.gl>cr.gv?cr.local:cr.gv>cr.gl?cr.vis:cr.elegido==='local'?cr.local:cr.vis;
      const ganP = ep.gl>ep.gv?ep.local:ep.gv>ep.gl?ep.vis:ep.elegido==='local'?ep.local:ep.vis;
      if(ganR&&ganP&&ganR===ganP) pts += cfg.ganador||1;
      if(ep.gl===cr.gl&&ep.gv===cr.gv) pts += cfg.exacto||3;
    }
  });
  return pts;
}

// Calcular puntos R3 para un cruce (para mostrar en tabla)
function ptsR3Cruce(ep, cr, cfg) {
  if(!cr||cr.gl===null||cr.gv===null) return null;
  if(!ep||ep.gl===null||ep.gv===null) return 0;
  let pts = 0;
  const lP=ep.local, vP=ep.vis, lR=cr.local, vR=cr.vis;
  const mismosEq = lP&&vP&&lR&&vR&&((lP===lR&&vP===vR)||(lP===vR&&vP===lR));
  if(mismosEq) pts += cfg.emparej||5;
  const ganR = cr.gl>cr.gv?cr.local:cr.gv>cr.gl?cr.vis:cr.elegido==='local'?cr.local:cr.vis;
  const ganP = ep.gl>ep.gv?ep.local:ep.gv>ep.gl?ep.vis:ep.elegido==='local'?ep.local:ep.vis;
  if(mismosEq&&ganR&&ganP&&ganR===ganP) pts += cfg.ganador||1;
  if(ep.gl===cr.gl&&ep.gv===cr.gv) pts += cfg.exacto||3;
  return pts;
}

function clsPts(pts, max) {
  if(pts===null) return 'pts-0';
  if(pts===max) return `pts-${max}`;
  if(pts>=max-1) return `pts-${max-1}`;
  if(pts>0) return 'pts-1';
  return 'pts-0';
}

let globalData = null;

async function cargar() {
  try {
    const [{ data: pronos }, { data: realRow }, { data: sesData }, { data: regRow },
           { data: crucesData }, { data: posData }, { data: pronPosData }] = await Promise.all([
      sb.from('pronosticos').select('user_id,nombre,datos'),
      sb.from('resultados_reales').select('datos').eq('id','00000000-0000-0000-0000-000000000001').maybeSingle(),
      sb.auth.getSession(),
      sb.from('config_reglas').select('reglas').eq('id',1).maybeSingle(),
      sb.from('cruces').select('*'),
      sb.from('posiciones_finales').select('equipo,posicion,eliminada'),
      sb.from('pronostico_posiciones').select('user_id,equipo,posicion'),
    ]);

    const real = realRow?.datos ? (typeof realRow.datos==='string'?JSON.parse(realRow.datos):realRow.datos) : null;
    const reglas = regRow?.reglas || { r1:{activa:true,ganador:1,exacto:3}, r3:{activa:true,emparej:5,ganador:1,exacto:3} };
    const miId = sesData?.session?.user?.id || null;
    // Cruces reales
    const crucesReal = crucesData || [];
    // Posiciones finales reales
    const posReal = {};
    const eliminadaReal = {};
    (posData||[]).forEach(p => { posReal[p.equipo] = p.posicion; eliminadaReal[p.equipo] = p.eliminada; });
    // Posiciones pronosticadas por jugador
    const pronPosPorUser = {};
    (pronPosData||[]).forEach(p => {
      if(!pronPosPorUser[p.user_id]) pronPosPorUser[p.user_id] = {};
      pronPosPorUser[p.user_id][p.equipo] = p.posicion;
    });

    // Calcular puntos totales para ordenar
    // Calcular puntos totales para cada jugador (R1+R2 simplificado para ordenar)
    const calcTotalSimple = (datos, real, reglas) => {
      if(!real||!datos) return 0;
      let r1=0,r2=0;
      const cfg1 = reglas.r1||{ganador:1,exacto:3};
      const cfg2 = reglas.r2||{posicion:3};
      GRUPOS.forEach((g,gi)=>{
        g.partidos.forEach((_,pi)=>{
          const rp=datos.resultados?.[gi]?.[pi], rr=real.resultados?.[gi]?.[pi];
          if(!rp||!rr||rp.local===null||rr.local===null||rp.visitante===null||rr.visitante===null)return;
          if(Math.sign(rp.local-rp.visitante)===Math.sign(rr.local-rr.visitante))r1+=cfg1.ganador||1;
          if(rp.local===rr.local&&rp.visitante===rr.visitante)r1+=cfg1.exacto||3;
        });
        const resReal=real.resultados?.[gi]||[];
        if(resReal.every(r=>r.local!==null&&r.visitante!==null)){
          const statsP={},statsR={};
          g.equipos.forEach(e=>{statsP[e]={pts:0,gf:0,gc:0};statsR[e]={pts:0,gf:0,gc:0};});
          const calcS=(res,stats)=>g.partidos.forEach(([loc,vis],pi)=>{
            const r=res[pi];if(!r||r.local===null)return;
            stats[loc].gf+=r.local;stats[loc].gc+=r.visitante;stats[vis].gf+=r.visitante;stats[vis].gc+=r.local;
            if(r.local>r.visitante)stats[loc].pts+=3;else if(r.local<r.visitante)stats[vis].pts+=3;else{stats[loc].pts++;stats[vis].pts++;}
          });
          calcS(datos.resultados?.[gi]||[],statsP);calcS(resReal,statsR);
          const ordP=[...g.equipos].sort((a,b)=>(statsP[b].pts-statsP[a].pts)||(statsP[b].gf-statsP[b].gc-(statsP[a].gf-statsP[a].gc))||statsP[b].gf-statsP[a].gf);
          const ordR=[...g.equipos].sort((a,b)=>(statsR[b].pts-statsR[a].pts)||(statsR[b].gf-statsR[b].gc-(statsR[a].gf-statsR[a].gc))||statsR[b].gf-statsR[a].gf);
          ordP.forEach((eq,pos)=>{if(ordR[pos]===eq)r2+=cfg2.posicion||3;});
        }
      });
      return r1+r2;
    };

    const jugadores = (pronos||[]).map(p => {
      const datos = typeof p.datos==='string'?JSON.parse(p.datos):p.datos;
      const r1r2 = calcTotalSimple(datos, real, reglas);
      const r3 = calcR3Jugador(datos, crucesReal, reglas.r3||{emparej:5,ganador:1,exacto:3});
      // R4 usando pronostico_posiciones de BD
      let r4 = 0;
      const posP = pronPosPorUser[p.user_id] || {};
      const tabla = reglas.r4?.tabla;
      const POS_IDX = {'1':0,'2':1,'3':2,'4':3,'SEMI':4,'QTR':4,'OCT':5,'D16':6,'G':7};
      if(tabla && Object.keys(posReal).length > 0) {
        GRUPOS.forEach(g => g.equipos.forEach(eq => {
          if(!eliminadaReal?.[eq]) return; // no eliminado aún
          const pr = posReal[eq], pp = posP[eq];
          if(!pr||!pp) return;
          const ri = POS_IDX[pr]??7, pi = POS_IDX[pp]??7;
          if(tabla[pi]?.[ri]!==undefined) r4 += tabla[pi][ri];
        }));
      }
      const total = r1r2 + r3 + r4;
      return { user_id: p.user_id, nombre: p.nombre, datos, esYo: p.user_id===miId, total };
    }).sort((a,b) => b.total - a.total); // ordenar por ranking (simplificado)

    globalData = { jugadores, real, reglas, miId, crucesReal, posReal, pronPosPorUser, eliminadaReal };
    renderTabla();
  } catch(e) {
    document.getElementById('contenido').innerHTML = `<div class="loading-txt">❌ Error: ${e.message}</div>`;
  }
}

function renderTabla() {
  if(!globalData) return;
  const { jugadores, real, reglas, miId, crucesReal, posReal, pronPosPorUser, eliminadaReal } = globalData;
  const mostrarGrupos = document.getElementById('chk-grupos').checked;
  const mostrarR2     = document.getElementById('chk-r2').checked;
  const mostrarElim   = document.getElementById('chk-elim').checked;

  const mostrarR4 = document.getElementById('chk-r4')?.checked;
  if(!mostrarGrupos && !mostrarR2 && !mostrarElim && !mostrarR4) {
    document.getElementById('contenido').innerHTML = '<div class="loading-txt">Selecciona al menos una sección.</div>';
    return;
  }

  let html = '<div class="tabla-wrap"><table><thead><tr>';
  html += `<th class="th-partido-header">Realidad > Ganador</th>`;
  jugadores.forEach(j => {
    const cls = j.esYo ? 'th-jugador yo' : 'th-jugador';
    html += `<th class="${cls}">${j.nombre.toUpperCase().split(' ')[0]}<br><span style="font-size:10px;font-weight:700;color:#fbbf24">${j.total} pts</span></th>`;
  });
  html += '</tr></thead><tbody>';

  // ── FASE DE GRUPOS ──
  if(mostrarGrupos) {
    GRUPOS.forEach((g, gi) => {
      // Cabecera de grupo
      html += `<tr class="tr-grupo-header"><td class="td-partido tr-grupo-header">${g.nombre}</td>`;
      jugadores.forEach(() => { html += '<td></td>'; });
      html += '</tr>';

      g.partidos.forEach((par, pi) => {
        const rr = real?.resultados?.[gi]?.[pi];
        const sinReal = !rr || rr.local===null || rr.visitante===null;
        const marcReal = sinReal ? '–' : `${rr.local}-${rr.visitante}`;

        html += `<tr>`;
        const ganReal = sinReal ? 0 : Math.sign(rr.local - rr.visitante);
        const fGan = ganReal === 1 ? F(par[0]) : ganReal === -1 ? F(par[1]) : (sinReal ? null : '🤝');
        html += `<td class="td-partido">
          <div class="partido-real">
            <span>${F(par[0])}</span>
            <span class="marcador-real${sinReal?' sin-dato':''}">${marcReal}</span>
            <span>${F(par[1])}</span>
            ${fGan ? `<span style="opacity:0.5;font-size:9px">▶</span><span>${fGan}</span>` : ''}
          </div>
        </td>`;

        jugadores.forEach(j => {
          const rp = j.datos?.resultados?.[gi]?.[pi];
          const sinPron = !rp || rp.local===null || rp.visitante===null;
          if(sinPron) { html += `<td class="td-pron"><span class="pron-vacio">–</span></td>`; return; }

          const pts = sinReal ? null : ptsR1(rp, rr, reglas.r1||{ganador:1,exacto:3});
          const maxPts = (reglas.r1?.ganador||1) + (reglas.r1?.exacto||3);
          const cls = pts===null?'pts-0':pts===maxPts?`pts-${maxPts}`:pts>0?'pts-1':'pts-0';

          html += `<td class="td-pron">
            <div class="pron-linea">${F(par[0])} ${rp.local}<span class="sep">-</span>${rp.visitante} ${F(par[1])} ${pts!==null?`<span class="pron-pts ${cls}">${pts>0?'+':''}${pts}</span>`:''}</div>
          </td>`;
        });
        html += '</tr>';
      });
    });
  }

  // ── ORDEN DE GRUPO (R2) ──
  if(mostrarR2) {
    html += `<tr class="tr-grupo-header"><td class="td-partido tr-grupo-header">📊 Orden de Grupo (R2)</td>`;
    jugadores.forEach(() => { html += '<td></td>'; });
    html += '</tr>';

    GRUPOS.forEach((g, gi) => {
      const resReal = real?.resultados?.[gi] || [];
      const grupoCompleto = resReal.length>0 && resReal.every(r => r.local!==null && r.visitante!==null);

      html += `<tr class="tr-grupo-header"><td class="td-partido tr-grupo-header" style="padding-left:16px">${g.nombre}${grupoCompleto?'':' (sin terminar)'}</td>`;
      jugadores.forEach(() => { html += '<td></td>'; });
      html += '</tr>';

      if(!grupoCompleto) return;

      const ordenR = ordenGrupo(gi, real.resultados);
      const cfg2 = reglas.r2 || {posicion:3};

      ['1º','2º','3º','4º'].forEach((label, pos) => {
        const eqReal = ordenR[pos];
        html += `<tr>`;
        html += `<td class="td-partido"><div class="partido-real"><span style="font-weight:700">${label}</span> <span>${F(eqReal)}</span> <span style="font-size:11px">${eqReal}</span></div></td>`;

        jugadores.forEach(j => {
          const ordenP = ordenGrupo(gi, j.datos?.resultados||[]);
          const eqP = ordenP[pos];
          const acierto = eqP === eqReal;
          const pts = acierto ? (cfg2.posicion||3) : 0;
          const cls = acierto ? 'pts-3' : 'pts-0';
          html += `<td class="td-pron"><div class="pron-linea">${F(eqP)} ${eqP} <span class="pron-pts ${cls}">${pts>0?'+':''}${pts}</span></div></td>`;
        });
        html += '</tr>';
      });
    });
  }

  // ── ELIMINATORIAS ──
  if(mostrarElim) {
    FASES_ELIM.forEach(fase => {
      // Cabecera de fase
      html += `<tr class="tr-grupo-header"><td class="td-partido tr-grupo-header">${fase.nombre}</td>`;
      jugadores.forEach(() => { html += '<td></td>'; });
      html += '</tr>';

      for(let i=0; i<fase.n; i++) {
        const er = real?.estadoFase?.[fase.key]?.[i];
        const sinReal = !er||er.gl===null||er.gv===null;
        const lEq = er?.local||'?', vEq = er?.vis||'?';
        const marcReal = sinReal ? '–' : `${er.gl}-${er.gv}`;

        html += `<tr>`;
        const ganElim = sinReal ? null : ganadorCruce(er);
        const fGanElim = ganElim === 'local' ? F(lEq) : ganElim === 'visitante' ? F(vEq) : (sinReal?null:'❓');
        html += `<td class="td-partido">
          <div class="partido-real">
            <span>${F(lEq)}</span>
            <span class="marcador-real${sinReal?' sin-dato':''}">${marcReal}</span>
            <span>${F(vEq)}</span>
            ${fGanElim ? `<span style="opacity:0.5;font-size:9px">▶</span><span>${fGanElim}</span>` : ''}
          </div>
        </td>`;

        jugadores.forEach(j => {
          const ep = j.datos?.estadoFase?.[fase.key]?.[i];
          const sinPron = !ep||ep.gl===null||ep.gv===null;
          if(sinPron) { html += `<td class="td-pron"><span class="pron-vacio">–</span></td>`; return; }

          const lEqP = ep?.local||'?', vEqP = ep?.vis||'?';
          // Buscar el cruce real correspondiente por equipos
          const crReal = crucesReal.find(cr => cr.fase===fase.key && cr.indice===i);
          const pts = (!crReal||crReal.gl===null) ? null : ptsR3Cruce(ep, crReal, reglas.r3||{emparej:5,ganador:1,exacto:3});
          const maxPts = (reglas.r3?.emparej||5)+(reglas.r3?.ganador||1)+(reglas.r3?.exacto||3);
          const cls = pts===null?'pts-0':pts===maxPts?`pts-${maxPts}`:pts>=(reglas.r3?.emparej||5)?'pts-6':pts>0?'pts-5':'pts-0';

          const flP = ep.local ? F(ep.local) : F(lEq);
          const fvP = ep.vis   ? F(ep.vis)   : F(vEq);
          html += `<td class="td-pron">
            <div class="pron-linea">${flP} ${ep.gl}<span class="sep">-</span>${ep.gv} ${fvP} ${pts!==null?`<span class="pron-pts ${cls}">${pts>0?'+':''}${pts}</span>`:''}</div>
          </td>`;
        });
        html += '</tr>';
      }
    });
  }

  // ── PUESTOS FINALES (R4) ──
  if(mostrarR4) {
    // Calcular posición real de cada equipo
    const calcPosReal = () => {
      // Usar posiciones_finales de BD directamente
      if(Object.keys(posReal).length > 0) return posReal;
      const pos = {};
      GRUPOS.forEach(g => g.equipos.forEach(eq => { pos[eq] = 'G'; }));
      if(!real) return pos;
      // Clasificados de grupos → D16
      GRUPOS.forEach((g,gi) => {
        const res = real.resultados?.[gi] || [];
        const stats = {};
        g.equipos.forEach(e => { stats[e]={pts:0,gf:0,gc:0}; });
        res.forEach((r,pi) => {
          if(r.local===null||r.visitante===null) return;
          const [loc,vis]=g.partidos[pi];
          stats[loc].gf+=r.local;stats[loc].gc+=r.visitante;
          stats[vis].gf+=r.visitante;stats[vis].gc+=r.local;
          if(r.local>r.visitante)stats[loc].pts+=3;
          else if(r.local<r.visitante)stats[vis].pts+=3;
          else{stats[loc].pts++;stats[vis].pts++;}
        });
        const ord=[...g.equipos].sort((a,b)=>(stats[b].pts-stats[a].pts)||(stats[b].gf-stats[b].gc-(stats[a].gf-stats[a].gc))||stats[b].gf-stats[a].gf);
        if(ord[0])pos[ord[0]]='D';
        if(ord[1])pos[ord[1]]='D';
      });
      // Fases eliminatorias
      const ef = real.estadoFase || {};
      const gan=(fase,i)=>{ const e=ef[fase]?.[i]||ef[fase]?.[String(i)]; if(!e||e.gl===null)return null; if(e.gl>e.gv)return e.local; if(e.gv>e.gl)return e.vis; return e.elegido==='local'?e.local:e.elegido==='visitante'?e.vis:null; };
      const per=(fase,i)=>{ const e=ef[fase]?.[i]||ef[fase]?.[String(i)]; if(!e||e.gl===null)return null; if(e.gl>e.gv)return e.vis; if(e.gv>e.gl)return e.local; return e.elegido==='local'?e.vis:e.elegido==='visitante'?e.local:null; };
      // D16
      for(let i=0;i<16;i++){const g=gan('d16',i);if(g)pos[g]='O';}
      // Oct
      for(let i=0;i<8;i++){const g=gan('oct',i),p=per('oct',i);if(g)pos[g]='C';if(p)pos[p]='O';}
      // Qtr
      for(let i=0;i<4;i++){const p=per('qtr',i);if(p)pos[p]='C';}
      // Semi
      for(let i=0;i<2;i++){const g=gan('semi',i),p=per('semi',i);if(g)pos[g]='2';if(p)pos[p]='4';}
      // Tercer
      const g3=gan('tercer',0),p3=per('tercer',0);if(g3)pos[g3]='3';if(p3)pos[p3]='4';
      // Final
      const gf=gan('final',0),pf=per('final',0);if(gf)pos[gf]='1';if(pf)pos[pf]='2';
      return pos;
    };

    const calcPosJugador = (j) => {
      // Usar pronostico_posiciones de BD si disponible
      if(pronPosPorUser[j.user_id] && Object.keys(pronPosPorUser[j.user_id]).length > 0) {
        return pronPosPorUser[j.user_id];
      }
      const pos = {};
      GRUPOS.forEach(g => g.equipos.forEach(eq => { pos[eq] = 'G'; }));
      const res = j.datos?.resultados || [];
      const ef = j.datos?.estadoFase || {};
      GRUPOS.forEach((g,gi) => {
        const stats = {};
        g.equipos.forEach(e=>{stats[e]={pts:0,gf:0,gc:0};});
        (res[gi]||[]).forEach((r,pi)=>{
          if(r.local===null||r.visitante===null)return;
          const [loc,vis]=g.partidos[pi];
          stats[loc].gf+=r.local;stats[loc].gc+=r.visitante;
          stats[vis].gf+=r.visitante;stats[vis].gc+=r.local;
          if(r.local>r.visitante)stats[loc].pts+=3;else if(r.local<r.visitante)stats[vis].pts+=3;else{stats[loc].pts++;stats[vis].pts++;}
        });
        const ord=[...g.equipos].sort((a,b)=>(stats[b].pts-stats[a].pts)||(stats[b].gf-stats[b].gc-(stats[a].gf-stats[a].gc))||stats[b].gf-stats[a].gf);
        if(ord[0])pos[ord[0]]='D';if(ord[1])pos[ord[1]]='D';
      });
      const gan=(fase,i)=>{ const e=ef[fase]?.[i]||ef[fase]?.[String(i)]; if(!e||e.gl===null)return null; const lEq=e.local||'?',vEq=e.vis||'?'; if(e.gl>e.gv)return lEq;if(e.gv>e.gl)return vEq;return e.elegido==='local'?lEq:e.elegido==='visitante'?vEq:null; };
      const per=(fase,i)=>{ const e=ef[fase]?.[i]||ef[fase]?.[String(i)]; if(!e||e.gl===null)return null; const lEq=e.local||'?',vEq=e.vis||'?'; if(e.gl>e.gv)return vEq;if(e.gv>e.gl)return lEq;return e.elegido==='local'?vEq:e.elegido==='visitante'?lEq:null; };
      for(let i=0;i<16;i++){const g=gan('d16',i);if(g&&g!=='?')pos[g]='O';}
      for(let i=0;i<8;i++){const g=gan('oct',i),p=per('oct',i);if(g&&g!=='?')pos[g]='C';if(p&&p!=='?')pos[p]='O';}
      for(let i=0;i<4;i++){const p=per('qtr',i);if(p&&p!=='?')pos[p]='C';}
      for(let i=0;i<2;i++){const g=gan('semi',i),p=per('semi',i);if(g&&g!=='?')pos[g]='2';if(p&&p!=='?')pos[p]='4';}
      const g3=gan('tercer',0),p3=per('tercer',0);if(g3&&g3!=='?')pos[g3]='3';if(p3&&p3!=='?')pos[p3]='4';
      const gf=gan('final',0),pf=per('final',0);if(gf&&gf!=='?')pos[gf]='1';if(pf&&pf!=='?')pos[pf]='2';
      return pos;
    };

    const POS_IDX = {'1':0,'2':1,'3':2,'4':3,'FINAL':3,'SEMI':4,'QTR':4,'C':4,'OCT':5,'O':5,'D16':6,'D':6,'G':7};
    const POS_LABEL = {'1':'Campeón','2':'Subcampeón','3':'3er Puesto','4':'4º Puesto','SEMI':'Semifinal','QTR':'Cuartos de Final','C':'Cuartos de Final','FINAL':'Final','OCT':'Octavos','O':'Octavos','D16':'Dieciseisavos','D':'Dieciseisavos','G':'Fase de Grupos'};
    const tabla_r4 = [[36,28,18,10,6,0,0,0],[28,32,16,10,6,0,0,0],[12,24,28,20,14,6,0,0],[0,10,20,24,12,6,0,0],[0,0,8,16,20,10,4,0],[0,0,0,6,12,16,8,2],[0,0,0,0,4,8,12,6],[0,0,0,0,0,2,4,8]];

    const posRealCalc = calcPosReal();
    const posJugadores = jugadores.map(j => calcPosJugador(j));

    // Ordenar equipos por posición real
    // Primero calcular posReal completo, luego ordenar
    const equiposOrdenados = Object.entries(posRealCalc)
      .sort((a,b) => {
        const ia = POS_IDX[a[1]] ?? 7;
        const ib = POS_IDX[b[1]] ?? 7;
        if(ia !== ib) return ia - ib;
        return a[0].localeCompare(b[0]); // alfabético dentro de la misma posición
      })
      .map(([eq,pos]) => ({eq,pos}));

    // Cabecera de sección
    html += `<tr class="tr-grupo-header"><td class="td-partido tr-grupo-header">🌍 Puestos Finales</td>`;
    jugadores.forEach(() => { html += '<td></td>'; });
    html += '</tr>';

    // Agrupar por posición
    let ultimaPos = null;
    equiposOrdenados.forEach(({eq, pos}) => {
      if(pos !== ultimaPos) {
        ultimaPos = pos;
        const secCls = pos==='1'?'tr-r4-campeon':pos==='2'?'tr-r4-sub':pos==='3'?'tr-r4-tercero':pos==='4'?'tr-r4-cuarto':'';
        html += `<tr class="tr-grupo-header ${secCls}"><td class="td-partido tr-grupo-header">${POS_LABEL[pos]||pos}</td>`;
        jugadores.forEach(() => { html += `<td></td>`; });
        html += '</tr>';
      }

      if(!eliminadaReal?.[eq]) return; // no eliminado aún
      html += '<tr>';
      html += `<td class="td-partido"><div class="partido-real"><span>${F(eq)}</span> <span style="font-size:11px;color:var(--text)">${eq}</span></div></td>`;

      posJugadores.forEach((posJ, ji) => {
        const posP = posJ[eq] || 'G';
        const ri = POS_IDX[pos] ?? 7;
        const pi = POS_IDX[posP] ?? 7;
        const pts = tabla_r4[pi]?.[ri] ?? 0;
        const maxPts = tabla_r4[ri]?.[ri] ?? 0;
        const cls = pts === maxPts ? 'pts-4' : pts > 0 ? 'pts-1' : 'pts-0';
        html += `<td class="td-pron"><div class="pron-linea" style="font-size:10px">${POS_LABEL[posP]||posP} <span class="pron-pts ${cls}">${pts>0?'+':''}${pts}</span></div></td>`;
      });
      html += '</tr>';
    });
  }

  html += '</tbody></table></div>';
  document.getElementById('contenido').innerHTML = html;

}

cargar();
</script>
