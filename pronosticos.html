<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Porra Mundial 2026 — Pronóstico</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --color-background-primary: #ffffff;
      --color-background-secondary: #f8fafc;
      --color-text-primary: #0f172a;
      --color-text-secondary: #475569;
      --color-text-tertiary: #94a3b8;
      --color-border-secondary: #cbd5e1;
      --color-border-tertiary: #e2e8f0;
      --border-radius-lg: 12px;
      --border-radius-md: 8px;
    }

    body { font-family: var(--font-sans); background: #f1f5f9; min-height: 100vh; }

    /* TOPBAR */
    .topbar {
      background: #1e293b; color: #f1f5f9;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.75rem 1rem; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .topbar-titulo { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .topbar-user { font-size: 12px; color: #94a3b8; display: flex; align-items: center; gap: 8px; }
    .btn-salir { background: none; border: 1px solid #475569; border-radius: 6px; color: #94a3b8; font-size: 11px; padding: 4px 8px; cursor: pointer; }
    .btn-salir:hover { border-color: #94a3b8; color: #f1f5f9; }

    /* GUARDAR BANNER */
    .guardar-bar {
      background: #fff; border-bottom: 1px solid #e2e8f0;
      padding: 0.6rem 1rem; display: flex; align-items: center;
      justify-content: space-between; gap: 8px;
      position: sticky; top: 49px; z-index: 99;
    }
    .guardar-estado { font-size: 12px; color: #64748b; }
    .guardar-estado.guardado { color: #16a34a; }
    .guardar-estado.error    { color: #dc2626; }
    .btn-guardar {
      background: #2563eb; color: #fff; border: none;
      border-radius: 8px; padding: 7px 16px; font-size: 13px;
      font-weight: 600; cursor: pointer; white-space: nowrap;
      transition: background 0.2s;
    }
    .btn-guardar:hover { background: #1d4ed8; }
    .btn-guardar:disabled { background: #cbd5e1; color: #94a3b8; cursor: default; }

    /* WIDGET */
    .app { max-width: 420px; margin: 0 auto; padding: 0 0 2rem; font-family: var(--font-sans); }
    .grupos-wrapper { overflow: hidden; }
    .grupos-track { display: flex; transition: transform 0.35s cubic-bezier(.4,0,.2,1); will-change: transform; }
    .grupo-slide { min-width: 100%; padding: 0 1rem; }

    .nav-btn { background: none; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 4px 10px; color: var(--color-text-secondary); font-size: 13px; cursor: pointer; line-height: 1; }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .grupo-header { display: flex !important; align-items: center; justify-content: space-between; }
    .grupo-header-titulo { flex: 1; text-align: center; font-size: 15px; font-weight: 500; }

    .dots { display: flex; justify-content: center; gap: 5px; padding: 0.6rem 0 0; flex-wrap: wrap; max-width: 320px; margin: 0 auto; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--color-border-secondary); cursor: pointer; transition: background 0.2s, transform 0.2s; flex-shrink: 0; }
    .dot.activo { background: #639922; transform: scale(1.3); }
    .dot.fase { background: #9CB8D8; }
    .dot.fase.activo { background: #2563EB; transform: scale(1.3); }
    .dot.final-dot { background: #C9A227; }
    .dot.final-dot.activo { background: #A07800; transform: scale(1.3); }
    .dot.palmares-dot { background: #C48A6A; }
    .dot.palmares-dot.activo { background: #8B4513; transform: scale(1.3); }

    .grupo-header { text-align: center; padding: 0.6rem 1rem; margin: 0.75rem 0 0.6rem; border-radius: var(--border-radius-lg); font-size: 15px; font-weight: 500; border: 0.5px solid var(--color-border-tertiary); transition: background 0.3s, color 0.3s; }
    .grupo-header.pendiente { background: var(--color-background-secondary); color: var(--color-text-secondary); }
    .grupo-header.completo  { background: #EAF3DE; color: #3B6D11; border-color: #C0DD97; }

    .partidos-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; margin-bottom: 0.6rem; }
    .partido { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 4px; padding: 7px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); }
    .partido:last-child { border-bottom: none; }
    .equipo-local  { display: flex; align-items: center; gap: 5px; justify-content: flex-end; }
    .equipo-visitante { display: flex; align-items: center; gap: 5px; }
    .bandera { font-size: 18px; line-height: 1; }
    .equipo-nombre { font-size: 10px; color: var(--color-text-secondary); max-width: 68px; text-align: right; line-height: 1.2; }
    .equipo-visitante .equipo-nombre { text-align: left; }
    .marcador { display: flex; align-items: center; gap: 3px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 3px 5px; }
    .score-input { width: 26px; height: 26px; text-align: center; font-size: 13px; font-weight: 500; border: 0.5px solid var(--color-border-secondary); border-radius: 5px; background: var(--color-background-primary); color: var(--color-text-primary); padding: 0; -moz-appearance: textfield; }
    .score-input::-webkit-outer-spin-button,.score-input::-webkit-inner-spin-button { -webkit-appearance: none; }

    /* BANNER TORNEO BLOQUEADO */
    .torneo-banner { display:none; position:sticky; top:49px; z-index:98; padding:10px 16px; font-size:12px; font-weight:500; text-align:center; }
    .torneo-banner.bloqueado  { display:block; background:#450a0a; color:#fca5a5; border-bottom:1px solid #7f1d1d; }
    .torneo-banner.finalizado { display:block; background:#1e3a5f; color:#93c5fd; border-bottom:1px solid #1e40af; }

    /* BOTTOM SHEET MARCADOR */
    .bs-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;animation:fadeIn 0.15s; }
    .bs-overlay.visible { display:block; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .bs-sheet { position:fixed;bottom:0;left:0;right:0;background:var(--color-background-primary);border-radius:16px 16px 0 0;z-index:201;padding:0 0 env(safe-area-inset-bottom);max-width:480px;margin:0 auto;right:0;left:0;box-shadow:0 -4px 24px rgba(0,0,0,0.15);transform:translateY(100%);transition:transform 0.25s cubic-bezier(.4,0,.2,1); }
    .bs-sheet.visible { transform:translateY(0); }
    .bs-handle { width:36px;height:4px;background:var(--color-border-secondary);border-radius:2px;margin:10px auto 0; }
    .bs-header { padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:6px; }
    .bs-nav-btn { background:none;border:0.5px solid #475569;border-radius:8px;padding:5px 10px;color:#94a3b8;font-size:13px;cursor:pointer;flex-shrink:0; }
    .bs-nav-btn:disabled { opacity:0.25;cursor:default; }
    .bs-header-center { flex:1;text-align:center; }
    .bs-titulo { font-size:13px;font-weight:600;color:var(--color-text-primary); }
    .bs-subtitulo { font-size:11px;color:var(--color-text-tertiary);margin-top:2px; }
    .bs-marcador-actual { display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 16px;background:var(--color-background-secondary);margin:0 16px;border-radius:10px; }
    .bs-score-display { font-size:28px;font-weight:700;color:var(--color-text-primary);min-width:32px;text-align:center; }
    .bs-sep { font-size:20px;color:var(--color-text-tertiary); }
    .bs-grid { display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:12px 16px 16px; }
    .bs-btn { background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:8px;padding:8px 4px;font-size:12px;font-weight:500;color:var(--color-text-primary);cursor:pointer;text-align:center;transition:background 0.1s;line-height:1.3; }
    .bs-btn:hover,.bs-btn:active { background:#4a5568;color:#fff;border-color:#4a5568; }
    .bs-btn.seleccionado { background:#4a5568;color:#fff;border-color:#4a5568; }
    .bs-extra { display:flex;align-items:center;justify-content:center;gap:4px;padding:0 12px 16px; }
    .bs-extra-grupo { display:flex;gap:3px; }
    .bs-extra-btn { background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:8px;padding:8px 0;font-size:13px;font-weight:600;color:var(--color-text-primary);cursor:pointer;width:calc((100vw - 80px) / 10);max-width:38px;min-width:28px;text-align:center;transition:background 0.1s; }
    .bs-extra-btn:hover,.bs-extra-btn:active { background:#4a5568;color:#fff;border-color:#4a5568; }
    .bs-extra-btn.sel-local { background:#2563eb;color:#fff;border-color:#2563eb; }
    .bs-extra-btn.sel-vis { background:#2563eb;color:#fff;border-color:#2563eb; }
    .bs-extra-sep { font-size:18px;color:var(--color-text-tertiary);font-weight:300;padding:0 2px;flex-shrink:0; }
    .score-sep { font-size: 12px; color: var(--color-text-tertiary); font-weight: 500; }

    .clasificacion-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); margin-bottom: 0.6rem; }
    .clas-cabecera { display: flex; align-items: center; gap: 8px; padding: 7px 12px; border-bottom: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); border-radius: var(--border-radius-lg) var(--border-radius-lg) 0 0; }
    .clas-titulo { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
    .empate-badge { font-size: 10px; font-weight: 500; color: #A32D2D; background: #FCEBEB; border: 0.5px solid #F7C1C1; border-radius: 4px; padding: 2px 6px; display: none; }
    .empate-badge.visible { display: inline-block; }
    .clas-tabla { width: 100%; border-collapse: collapse; font-size: 11px; }
    .clas-tabla th { padding: 4px 5px; color: var(--color-text-tertiary); font-weight: 500; font-size: 10px; text-align: center; border-bottom: 0.5px solid var(--color-border-tertiary); }
    .clas-tabla th:nth-child(2) { text-align: left; padding-left: 4px; }
    .clas-tabla td { padding: 6px 5px; text-align: center; color: var(--color-text-primary); border-bottom: 0.5px solid var(--color-border-tertiary); }
    .clas-tabla tr:last-child td { border-bottom: none; }
    .clas-tabla td:nth-child(2) { text-align: left; padding-left: 4px; }
    .pos-num { font-weight: 500; color: var(--color-text-secondary); width: 12px; display: inline-block; text-align: center; font-size: 10px; }
    .pos-num.top2 { color: #3B6D11; }
    .pos-num.top3 { color: #1D6BA8; }
    .pts { font-weight: 500; }
    .drag-handle { cursor: grab; color: var(--color-text-tertiary); font-size: 13px; display: none; vertical-align: middle; }
    .drag-handle.visible { display: inline; }
    .clas-row.dragging { opacity: 0.4; }
    .clas-row.drag-over { background: #EAF3DE; }

    /* ELIMINATORIAS */
    .fase-header { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 1rem; margin: 0.75rem 0 0.6rem; border-radius: var(--border-radius-lg); font-size: 15px; font-weight: 600; color: #fff; border: none; }
    .fase-d16   { background: #1e3a5f; }
    .fase-oct   { background: #3a1e5f; }
    .fase-qtr   { background: #5f1e3a; }
    .fase-semi  { background: #5f3a1e; }
    .fase-final { background: #7A6000; }

    .terceros-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; margin-bottom: 0.75rem; }
    .terceros-cabecera { padding: 7px 12px; background: var(--color-background-secondary); border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
    .terceros-tabla { width: 100%; border-collapse: collapse; font-size: 11px; }
    .terceros-tabla th { padding: 4px 5px; color: var(--color-text-tertiary); font-size: 10px; text-align: center; border-bottom: 0.5px solid var(--color-border-tertiary); font-weight: 500; }
    .terceros-tabla th:nth-child(2) { text-align: left; padding-left: 8px; }
    .terceros-tabla td { padding: 6px 5px; text-align: center; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); font-size: 11px; }
    .terceros-tabla tr:last-child td { border-bottom: none; }
    .terceros-tabla td:nth-child(2) { text-align: left; padding-left: 8px; }
    .t-no td { color: var(--color-text-tertiary); }
    .t-empate-aviso { background: #FAEEDA; border: 0.5px solid #FAC775; border-radius: 6px; padding: 8px 12px; font-size: 11px; color: #633806; margin: 8px 12px; line-height: 1.4; }
    .t-empate-aviso strong { color: #A05C00; }
    .t-selector-row { cursor: pointer; transition: background 0.15s; }
    .t-selector-row:hover td { background: #F0F7FF; }
    .t-selector-row.seleccionado td { background: #4a5568; color: #fff; }
    .t-selector-row.seleccionado td { color: #fff !important; }
    .t-check { font-size: 14px; text-align: center; }
    .btn-reset-terceros { font-size: 10px; color: #2563eb; background: none; border: 1px solid #2563eb; border-radius: 4px; padding: 2px 8px; cursor: pointer; margin-left: 8px; }

    .cruces-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; margin-bottom: 0.75rem; }
    .cruces-cabecera { padding: 7px 12px; background: var(--color-background-secondary); border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
    .cruce-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: stretch; border-bottom: 0.5px solid var(--color-border-tertiary); }
    .cruce-row:last-child { border-bottom: none; }
    .cruce-equipo { display: flex; flex-direction: column; justify-content: center; padding: 8px 8px; cursor: pointer; transition: background 0.15s; gap: 2px; }
    .cruce-equipo.local { align-items: flex-end; text-align: right; }
    .cruce-equipo.visitante { align-items: flex-start; text-align: left; }
    .cruce-equipo.ganador { background: #4a5568; }
    .cruce-equipo.ganador .cruce-eq-nombre,
    .cruce-equipo.ganador .cruce-eq-label { color: #fff; }
    .cruce-equipo.perdedor { opacity: 0.38; }
    .cruce-equipo:not(.ganador):not(.perdedor):hover { background: var(--color-background-secondary); }
    .cruce-eq-label { font-size: 9px; color: var(--color-text-tertiary); line-height: 1; }
    .cruce-eq-nombre { font-size: 11px; font-weight: 500; color: var(--color-text-primary); line-height: 1.3; display: flex; align-items: center; gap: 5px; }
    .cruce-eq-nombre .bf { font-size: 18px; line-height: 1; }
    .cruce-equipo.local .cruce-eq-nombre { flex-direction: row-reverse; }
    .cruce-centro { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; padding: 6px 4px; background: var(--color-background-secondary); min-width: 70px; }
    .cruce-pnum { font-size: 9px; color: #fff; background: #1e3a5f; border-radius: 3px; padding: 2px 5px; font-weight: 600; white-space: nowrap; }
    .cruce-marcador { display: flex; align-items: center; gap: 3px; }
    .cruce-score { width: 24px; height: 24px; text-align: center; font-size: 12px; font-weight: 500; border: 0.5px solid var(--color-border-secondary); border-radius: 4px; background: var(--color-background-primary); color: var(--color-text-primary); padding: 0; -moz-appearance: textfield; }
    .cruce-score::-webkit-outer-spin-button,.cruce-score::-webkit-inner-spin-button { -webkit-appearance: none; }
    .cruce-sep { font-size: 11px; color: var(--color-text-tertiary); }
    .empate-hint { font-size: 9px; color: #A32D2D; text-align: center; padding: 0 6px 5px; line-height: 1.3; display: none; }
    .empate-hint.visible { display: block; }

    /* PALMARÉS */
    .palmares-header { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 1rem; margin: 0.75rem 0 0.6rem; border-radius: var(--border-radius-lg); font-size: 15px; font-weight: 600; color: #fff; background: #5C3317; }
    .palmares-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; margin-bottom: 0.75rem; }
    .palmares-seccion { border-bottom: 0.5px solid var(--color-border-tertiary); }
    .palmares-seccion:last-child { border-bottom: none; }
    .palmares-titulo { padding: 7px 12px; background: var(--color-background-secondary); font-size: 11px; font-weight: 600; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 0.5px solid var(--color-border-tertiary); }
    .palmares-fila { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-bottom: 0.5px solid var(--color-border-tertiary); }
    .palmares-fila:last-child { border-bottom: none; }
    .palmares-pos { font-size: 18px; width: 28px; text-align: center; flex-shrink: 0; }
    .palmares-eq { font-size: 12px; font-weight: 500; color: var(--color-text-primary); display: flex; align-items: center; gap: 6px; }
    .palmares-eq .bf { font-size: 18px; }
    .palmares-pending { font-size: 11px; color: var(--color-text-tertiary); font-style: italic; }
    .palmares-grupo { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px 12px; }
    .palmares-tag { font-size: 11px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 4px; padding: 3px 7px; color: var(--color-text-primary); display: flex; align-items: center; gap: 4px; }
    .palmares-tag .bf { font-size: 14px; }

    /* LOADING */
    .loading-overlay { position: fixed; inset: 0; background: #f1f5f9; display: flex; align-items: center; justify-content: center; z-index: 999; flex-direction: column; gap: 12px; }
    .loading-overlay.oculto { display: none; }
    .spinner { width: 36px; height: 36px; border: 3px solid #e2e8f0; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-txt { font-size: 14px; color: #64748b; }
  </style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-txt">Cargando tu pronóstico...</div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-titulo">🏆 Porra Mundial 2026</div>
  <a href="index.html" style="color:#94a3b8;font-size:12px;text-decoration:none;border:1px solid #475569;border-radius:6px;padding:4px 10px;white-space:nowrap;" title="Ir al inicio">🏠 Inicio</a>
    <div class="topbar-user">
    <span id="user-nombre">...</span>
    <button class="btn-salir" onclick="salir()">Salir</button>
  </div>
</div>

<!-- GUARDAR -->
<div class="torneo-banner" id="torneo-banner"></div>
<div class="guardar-bar">
  <span class="guardar-estado" id="guardar-estado">Sin cambios guardados</span>
  <button class="btn-guardar" id="btn-guardar" onclick="guardarPronostico()">💾 Guardar</button>
</div>

<!-- WIDGET -->
<div class="app">

  <div class="grupos-wrapper" id="wrapper">
    <div class="grupos-track" id="track"></div>
  </div>
  <div class="dots" id="dots"></div>
</div>

<!-- BOTTOM SHEET MARCADOR -->
<div class="bs-overlay" id="bs-overlay" onclick="cerrarBS()"></div>
<div class="bs-sheet" id="bs-sheet">
  <div class="bs-handle"></div>
  <div class="bs-header">
    <button class="bs-nav-btn" id="bs-btn-prev" onclick="navegarBS(-1)">◀</button>
    <div class="bs-header-center">
      <div class="bs-titulo" id="bs-titulo">Elige el resultado</div>
    </div>
    <button class="bs-nav-btn" id="bs-btn-next" onclick="navegarBS(1)">▶</button>
  </div>
  <div class="bs-marcador-actual">
    <span class="bs-score-display" id="bs-local-display">–</span>
    <span class="bs-sep">:</span>
    <span class="bs-score-display" id="bs-vis-display">–</span>
  </div>
  <div class="bs-grid" id="bs-grid"></div>
  <div class="bs-extra" id="bs-extra">
    <div class="bs-extra-grupo" id="bs-extra-local"></div>
    <span class="bs-extra-sep">—</span>
    <div class="bs-extra-grupo" id="bs-extra-vis"></div>
  </div>
</div>

// ===== STATS =====
function calcStats(gi){
  const g=GRUPOS[gi],stats={};
  g.equipos.forEach(e=>{stats[e]={pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,pts:0};});
  resultados[gi].forEach((r,pi)=>{
    if(r.local===null||r.visitante===null)return;
    const [loc,vis]=g.partidos[pi],el=stats[loc],ev=stats[vis],gl=r.local,gv=r.visitante;
    el.pj++;ev.pj++;el.gf+=gl;el.gc+=gv;ev.gf+=gv;ev.gc+=gl;
    if(gl>gv){el.pg++;el.pts+=3;ev.pp++;}else if(gl<gv){ev.pg++;ev.pts+=3;el.pp++;}else{el.pe++;ev.pe++;el.pts++;ev.pts++;}
  });
  return stats;
}
function sortNatural(eq,st){return [...eq].sort((a,b)=>(st[b].pts-st[a].pts)||(st[b].gf-st[b].gc-(st[a].gf-st[a].gc))||st[b].gf-st[a].gf);}
function getOrdenFinal(gi,stats){
  const nat=sortNatural(GRUPOS[gi].equipos,stats);
  if(!ordenManual[gi])return nat;
  const pp={};nat.forEach(eq=>{const p=stats[eq].pts;if(!pp[p])pp[p]=[];pp[p].push(eq);});
  const r=[];[...new Set(nat.map(e=>stats[e].pts))].forEach(p=>{const g=pp[p];if(g.length===1){r.push(g[0]);return;}const s=ordenManual[gi].filter(e=>g.includes(e));r.push(...s,...g.filter(e=>!s.includes(e)));});
  return r;
}
function hayEmpate(stats){const eq=Object.keys(stats);return eq.some((e,i)=>eq.some((f,j)=>i<j&&stats[e].pts===stats[f].pts));}
function getClasificados(gi){const stats=calcStats(gi),orden=getOrdenFinal(gi,stats);return{p1:orden[0],p2:orden[1],p3:orden[2],stats};}

// Detecta si hay empate en la frontera 8/9 que requiere selección manual
function detectarEmpateFrontera(t3all) {
  if(t3all.length < 9) return false;
  const t8 = t3all[7], t9 = t3all[8];
  return t8.pts === t9.pts && t8.dg === t9.dg && t8.gf === t9.gf;
}

// Devuelve los 8 terceros efectivos (manuales si se eligieron, automáticos si no)
function get8TercerosEfectivos() {
  const t3all = get8Terceros();
  if(!tercerosManuales) return t3all.slice(0,8);
  // Verificar que los manuales siguen siendo válidos (los mismos terceros)
  const giSet = new Set(t3all.map(t=>t.gi));
  const valid = tercerosManuales.every(gi => giSet.has(gi));
  if(!valid || tercerosManuales.length !== 8) return t3all.slice(0,8);
  return tercerosManuales.map(gi => t3all.find(t=>t.gi===gi)).filter(Boolean);

function asignarTerceros(top8){
  const letras=top8.map(t=>letraGrupo(t.gi));
  const key=[...letras].sort().join(',');
  const fila=FIFA_TABLA[key];
  if(!fila){ console.warn('Combinación no en tabla FIFA:',key); return asignarTercerosFallback(top8); }
  const giMap={};
  top8.forEach(t=>{ giMap[letraGrupo(t.gi)]=t; });
  const asig={};
  PARTIDOS_VAR.forEach(pv=>{ const letra=fila[pv.pnum]; asig[pv.pnum]=letra?(giMap[letra]||null):null; });
  return asig;
}
function asignarTercerosFallback(top8){
  const pvs=PARTIDOS_VAR,giMap={};
  top8.forEach(t=>{giMap[t.gi]=t;});
  const gis=top8.map(t=>t.gi),pAgi={},giAp={};
  function aug(pnum,vis){const pv=pvs.find(p=>p.pnum===pnum);for(const gi of gis){if(vis.has(gi)||!pv.ok.includes(gi))continue;vis.add(gi);if(!(gi in giAp)||aug(giAp[gi],vis)){pAgi[pnum]=gi;giAp[gi]=pnum;return true;}}return false;}
  pvs.forEach(pv=>aug(pv.pnum,new Set()));
  const asig={};pvs.forEach(pv=>{asig[pv.pnum]=(pv.pnum in pAgi)?giMap[pAgi[pv.pnum]]:null;});return asig;
}

let dragSrcRow=null;
function setupTableDrag(gi){
  const tbody=document.getElementById(`cb-${gi}`);if(!tbody)return;
  tbody.querySelectorAll('.clas-row[draggable="true"]').forEach(row=>{
    row.addEventListener('dragstart',e=>{dragSrcRow=row;row.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    row.addEventListener('dragend',()=>{if(dragSrcRow)dragSrcRow.classList.remove('dragging');dragSrcRow=null;});
    row.addEventListener('dragover',e=>{e.preventDefault();row.classList.add('drag-over');});
    row.addEventListener('dragleave',()=>row.classList.remove('drag-over'));
    row.addEventListener('drop',e=>{
      e.preventDefault();row.classList.remove('drag-over');
      if(!dragSrcRow||dragSrcRow===row||+dragSrcRow.dataset.gi!==gi)return;
      const stats=calcStats(gi),oa=getOrdenFinal(gi,stats);
      const si=oa.indexOf(dragSrcRow.dataset.eq),ti=oa.indexOf(row.dataset.eq);
      if(si<0||ti<0)return;const n=[...oa];n.splice(si,1);n.splice(ti,0,dragSrcRow.dataset.eq);ordenManual[gi]=n;renderTabla(gi);marcarPendiente();
    });
    let tS=null,tE=null;
    row.addEventListener('touchstart',e=>{tS=row;tE=row.dataset.eq;row.classList.add('dragging');},{passive:true});
    row.addEventListener('touchend',e=>{
      if(tS)tS.classList.remove('dragging');
      const pt=e.changedTouches[0],el=document.elementFromPoint(pt.clientX,pt.clientY);
      const tgt=el&&el.closest('.clas-row[draggable="true"]');
      if(tgt&&tgt!==tS&&+tgt.dataset.gi===gi){const stats=calcStats(gi),oa=getOrdenFinal(gi,stats);const si=oa.indexOf(tE),ti=oa.indexOf(tgt.dataset.eq);if(si>-1&&ti>-1){const n=[...oa];n.splice(si,1);n.splice(ti,0,tE);ordenManual[gi]=n;marcarPendiente();}}
      tS=null;tE=null;renderTabla(gi);
    });
  });
}

function renderCruces(containerId,cruces,estadoObj,faseKey,etiqFn){

    const clL=ganador==='local'?'ganador':ganador==='visitante'?'perdedor':'';
    const clV=ganador==='visitante'?'ganador':ganador==='local'?'perdedor':'';
    const esEmpate=gl!==null&&gv!==null&&gl===gv;

          <span class="cruce-pnum">${c.pnum}</span>
          <div class="cruce-marcador" style="cursor:pointer" onclick="abrirBSElim('${faseKey}',${i},'${lEq}','${vEq}',${gl},${gv})">
            <input class="cruce-score" type="number" min="0" max="20" value="${gl!==null?gl:''}" placeholder="–" data-fase="${faseKey}" data-idx="${i}" data-lado="local" readonly style="cursor:pointer;pointer-events:none">
            <span class="cruce-sep">:</span>
            <input class="cruce-score" type="number" min="0" max="20" value="${gv!==null?gv:''}" placeholder="–" data-fase="${faseKey}" data-idx="${i}" data-lado="vis" readonly style="cursor:pointer;pointer-events:none">
          </div>
        </div>
        <div class="cruce-equipo visitante ${clV}" onclick="clickElim('${faseKey}',${i},'visitante')">
          <span class="cruce-eq-label">${vEtiq}</span>

        </div>
      </div>
      <div class="empate-hint${esEmpate&&!est.elegido?' visible':''}" id="hint-${faseKey}-${i}">Empate — toca el equipo que pasa</div>
    </div>`;
  }).join('');
  cont.querySelectorAll('.cruce-score').forEach(inp=>{

      if(!estadoFase[fase][ii])estadoFase[fase][ii]={gl:null,gv:null,elegido:null};
      const val=e.target.value===''?null:Math.max(0,+e.target.value);
      if(lado==='local')estadoFase[fase][ii].gl=val;else estadoFase[fase][ii].gv=val;
      const {gl,gv}=estadoFase[fase][ii];
      if(gl!==null&&gv!==null&&gl!==gv)estadoFase[fase][ii].elegido=null;
      // Guardar nombres de equipos
      const cr=cruces[ii];
      if(cr){estadoFase[fase][ii].local=cr.local?.eq||'?';estadoFase[fase][ii].vis=cr.vis?.eq||'?';}

}
function clickElim(faseKey,i,lado){
  if(!estadoFase[faseKey][i])return;
  const {gl,gv}=estadoFase[faseKey][i];
  if(gl===null||gv===null||gl!==gv)return;
  estadoFase[faseKey][i].elegido=lado;

  const buildFns={d16:buildCrucesD16,oct:buildCrucesOct,qtr:buildCrucesQtr,semi:buildCrucesSemi,tercer:buildCrucesTercer,final:buildCrucesFinal};
  if(buildFns[faseKey]){const cr=buildFns[faseKey]()[i];if(cr){estadoFase[faseKey][i].local=cr.local?.eq||'?';estadoFase[faseKey][i].vis=cr.vis?.eq||'?';}}
  renderFase(faseKey); marcarPendiente();
}

function toggleTerceroManual(gi, necesitamos, gisFrontera) {
  const t3all = get8Terceros();
  // Los que ya clasifican sin duda (no están en la frontera)
  const clasificadosFijos = t3all.filter((t,i) => i<8 && !gisFrontera.includes(t.gi)).map(t=>t.gi);
  
  if(!tercerosManuales) {
    // Inicializar con los que ya clasifican automáticamente de entre los empatados
    const autoEmpate = t3all.filter(t=>gisFrontera.includes(t.gi)).slice(0, necesitamos).map(t=>t.gi);
    tercerosManuales = [...clasificadosFijos, ...autoEmpate];
  }
  
  const idx8 = tercerosManuales.indexOf(gi);
  if(idx8 >= 0) {
    // Deseleccionar — solo si quedan suficientes seleccionados
    const selEmpate = tercerosManuales.filter(g => gisFrontera.includes(g));
    if(selEmpate.length <= necesitamos) return; // no se puede deseleccionar más
    tercerosManuales = tercerosManuales.filter(g => g !== gi);
  } else {
    // Seleccionar — comprobar que no excedemos
    const selEmpate = tercerosManuales.filter(g => gisFrontera.includes(g));
    if(selEmpate.length >= necesitamos) {
      // Reemplazar el primero seleccionado de la frontera
      const primero = tercerosManuales.find(g => gisFrontera.includes(g));
      tercerosManuales = tercerosManuales.filter(g => g !== primero);
    }
    tercerosManuales.push(gi);
  }
  marcarPendiente();
  renderFase('d16');
}

function resetTercerosManuales() {
  tercerosManuales = null;
  marcarPendiente();
  renderFase('d16');
}

function eqTag(obj){if(!obj||obj.eq==='?')return `<span class="palmares-pending">Por determinar</span>`;return `<span class="palmares-eq"><span class="bf">${getFlagFor(obj.eq)}</span>${obj.eq}</span>`;}

  const t3all=get8Terceros();

  document.getElementById('bs-local-display').textContent = gl !== null ? gl : '–';
  document.getElementById('bs-vis-display').textContent  = gv !== null ? gv : '–';
}

function renderBSGrid(glActual, gvActual) {
  const grid = document.getElementById('bs-grid');
  grid.innerHTML = MARCADORES_BS.map(([gl,gv]) => {
    const sel = gl===glActual && gv===gvActual ? ' seleccionado' : '';
    return `<button class="bs-btn${sel}" onclick="elegirMarcador(${gl},${gv})">${gl}–${gv}</button>`;
  }).join('');

  // Botones extra para goles 5-9
  const extraLocal = document.getElementById('bs-extra-local');
  const extraVis   = document.getElementById('bs-extra-vis');
  const glSelLocal = (glActual !== null && glActual >= 5) ? glActual : null;
  const gvSelVis   = (gvActual !== null && gvActual >= 5) ? gvActual : null;

  extraLocal.innerHTML = [5,6,7,8,9].map(n =>
    `<button class="bs-extra-btn${n===glSelLocal?' sel-local':''}" onclick="elegirGolExtra('local',${n})">${n}</button>`
  ).join('');
  extraVis.innerHTML = [5,6,7,8,9].map(n =>
    `<button class="bs-extra-btn${n===gvSelVis?' sel-vis':''}" onclick="elegirGolExtra('vis',${n})">${n}</button>`
  ).join('');
}

function elegirGolExtra(lado, n) {
  if(!bsCtx) return;
  // Obtener marcador actual
  let gl, gv;
  if(bsCtx.tipo === 'elim') {
    const est = estadoFase[bsCtx.faseKey][bsCtx.cruceidx] || {gl:null,gv:null};
    gl = est.gl; gv = est.gv;
  } else {
    gl = resultados[bsCtx.gi][bsCtx.pi].local;
    gv = resultados[bsCtx.gi][bsCtx.pi].visitante;
  }
  if(lado === 'local') gl = n; else gv = n;
  elegirMarcador(gl, gv);
}

function elegirMarcador(gl, gv) {
  if(!bsCtx) return;
  if(bsCtx.tipo === 'elim') {
    const fase = bsCtx.faseKey, ii = bsCtx.cruceidx;
    if(!estadoFase[fase][ii]) estadoFase[fase][ii]={gl:null,gv:null,elegido:null};
    estadoFase[fase][ii].gl = gl;
    estadoFase[fase][ii].gv = gv;
    if(gl!==null && gv!==null && gl!==gv) estadoFase[fase][ii].elegido=null;
    if(bsCtx.localEq) estadoFase[fase][ii].local = bsCtx.localEq;
    if(bsCtx.visEq)   estadoFase[fase][ii].vis   = bsCtx.visEq;
    actualizarBSDisplay(gl, gv);
    renderBSGrid(gl, gv);
    renderFase(fase);
    marcarPendiente();
  } else {
    const {gi, pi} = bsCtx;
    resultados[gi][pi].local     = gl;
    resultados[gi][pi].visitante = gv;
    actualizarBSDisplay(gl, gv);
    renderBSGrid(gl, gv);
    // Actualizar inputs en el DOM
    const inputs = document.querySelectorAll(`.score-input[data-gi="${gi}"][data-pi="${pi}"]`);
    inputs.forEach(inp => { inp.value = inp.dataset.lado === 'local' ? (gl !== null ? gl : '') : (gv !== null ? gv : ''); });
    if(ordenManual[gi]){const st=calcStats(gi),pp={};GRUPOS[gi].equipos.forEach(eq=>{const p=st[eq].pts;if(!pp[p])pp[p]=[];pp[p].push(eq);});const h=Object.values(pp).filter(x=>x.length>1).flat().sort().join(',');if(!window._eh)window._eh={};if(window._eh[gi]&&window._eh[gi]!==h)ordenManual[gi]=null;window._eh[gi]=h;}
    renderTabla(gi);
    marcarPendiente();
  }
}

// Swipe down para cerrar
let bsStartY = 0;
document.getElementById('bs-sheet').addEventListener('touchstart', e=>{ bsStartY=e.touches[0].clientY; }, {passive:true});
document.getElementById('bs-sheet').addEventListener('touchend', e=>{
  if(e.changedTouches[0].clientY - bsStartY > 60) cerrarBS();
});

function navegarBS(dir) {
  if(!bsCtx) return;
  if(bsCtx.tipo === 'elim') {
    const fase = bsCtx.faseKey;
    // En pronosticos los cruces se obtienen con buildCruces por fase
    const buildFns = {d16:buildCrucesD16, oct:buildCrucesOct, qtr:buildCrucesQtr, semi:buildCrucesSemi, tercer:buildCrucesTercer, final:buildCrucesFinal};
    const cruces = buildFns[fase] ? buildFns[fase]() : [];
    const newIdx = bsCtx.cruceidx + dir;
    if(newIdx < 0 || newIdx >= cruces.length) return;
    const cr = cruces[newIdx];
    const lEq = cr.local?.eq||'?', vEq = cr.vis?.eq||'?';
    const est = estadoFase[fase][newIdx] || estadoFase[fase][String(newIdx)] || {gl:null,gv:null,elegido:null};
    bsCtx = {faseKey: fase, cruceidx: newIdx, tipo: 'elim', localEq: lEq, visEq: vEq};
    document.getElementById('bs-titulo').textContent = `${lEq} vs ${vEq}`;
    actualizarBSDisplay(est.gl, est.gv);
    renderBSGrid(est.gl, est.gv);
  } else {
    const gi = bsCtx.gi;
    const newPi = bsCtx.pi + dir;
    if(newPi < 0 || newPi >= GRUPOS[gi].partidos.length) return;
    const par = GRUPOS[gi].partidos[newPi];
    const r = resultados[gi][newPi];
    bsCtx = {gi, pi: newPi};
    document.getElementById('bs-titulo').textContent = `${par[0]} vs ${par[1]}`;
    actualizarBSDisplay(r.local, r.visitante);
    renderBSGrid(r.local, r.visitante);
  }
  actualizarBSNavBtns();
}

function actualizarBSNavBtns() {
  if(!bsCtx) return;
  const prev = document.getElementById('bs-btn-prev');
  const next = document.getElementById('bs-btn-next');
  if(!prev || !next) return;
  if(bsCtx.tipo === 'elim') {
    const buildFns = {d16:buildCrucesD16, oct:buildCrucesOct, qtr:buildCrucesQtr, semi:buildCrucesSemi, tercer:buildCrucesTercer, final:buildCrucesFinal};
    const cruces = buildFns[bsCtx.faseKey] ? buildFns[bsCtx.faseKey]() : [];
    prev.disabled = bsCtx.cruceidx <= 0;
    next.disabled = bsCtx.cruceidx >= cruces.length - 1;
  } else {
    prev.disabled = bsCtx.pi <= 0;
    next.disabled = bsCtx.pi >= GRUPOS[bsCtx.gi].partidos.length - 1;
  }
}

buildSlides();
initAuth();
</script>
